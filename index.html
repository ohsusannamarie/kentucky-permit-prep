s & Signals",difficulty:"easy",question:"A green traffic sign generally provides:",options:["Speed limit information","Warning of hazards","Guidance like directions and distances","Prohibition information"],correct:2,explanation:"Green signs give guidance: directions, distances, and permitted movements. Think highway exit signs."},{id:5,category:"Signs & Signals",difficulty:"easy",question:"A blue sign tells you about:",options:["Highway speed limits","Motorist services such as gas, food, and lodging","Construction zones","School crossing locations"],correct:1,explanation:"Blue signs = motorist services. Gas stations, restaurants, hospitals, and rest areas."},{id:6,category:"Signs & Signals",difficulty:"easy",question:"A brown sign indicates:",options:["Caution: workers ahead","Industrial zones","Recreational and cultural sites such as parks","Speed advisory information"],correct:2,explanation:"Brown signs mark recreational and cultural places — parks, historic sites, nature areas."},{id:7,category:"Signs & Signals",difficulty:"easy",question:"An eight-sided (octagon) sign always means:",options:["Yield the right of way","Stop completely","Slow down for a curve","No passing zone"],correct:1,explanation:"The octagon shape is used ONLY for stop signs. You must come to a complete stop every time."},{id:8,category:"Signs & Signals",difficulty:"easy",question:"A downward-pointing triangle sign means:",options:["No entry ahead","Yield the right of way","Stop ahead","Speed limit change"],correct:1,explanation:"A downward triangle is always a yield sign. Slow down and give right of way to crossing traffic."},{id:9,category:"Signs & Signals",difficulty:"medium",question:"A diamond-shaped sign is used to:",options:["Provide directions to destinations","Warn of hazards or changing conditions ahead","Indicate one-way streets only","Show speed limits"],correct:1,explanation:"Diamond-shaped signs are warning signs — they alert you to possible hazards ahead."},{id:10,category:"Signs & Signals",difficulty:"easy",question:"A five-sided (pentagon) sign marks:",options:["A state border","A railroad crossing","A school zone or school crossing","A hospital zone"],correct:2,explanation:"Pentagon signs mark school zones and crossings. Slow down and watch for children."},{id:11,category:"Signs & Signals",difficulty:"easy",question:"A round sign warns you of:",options:["A curve ahead","A railroad crossing ahead","A school crossing","A one-way street"],correct:1,explanation:"Round signs = railroad crossing ahead. Prepare to stop if a train is coming."},{id:12,category:"Signs & Signals",difficulty:"medium",question:'An X-shaped "RAILROAD CROSSING" sign (crossbuck) means:',options:["Stop completely every time","Yield to any approaching train","Speed across the tracks quickly","Treat it like a yield sign"],correct:1,explanation:"The crossbuck sign means yield to trains. Stop completely if a train is approaching."},{id:13,category:"Signs & Signals",difficulty:"easy",question:"A vertical rectangular sign is usually a:",options:["Warning sign for hazards","Regulatory sign telling you a law to obey","Guide sign with directions","Service sign for motorists"],correct:1,explanation:"Vertical rectangles are regulatory signs — they state laws you must follow, like speed limits."},{id:14,category:"Signs & Signals",difficulty:"easy",question:"A speed limit sign shows the:",options:["Minimum speed at all times","Recommended speed for curves","Maximum legal speed under ideal conditions","Average speed other drivers are traveling"],correct:2,explanation:"Speed limits are the maximum legal speed under ideal conditions. Adjust lower in bad weather."},{id:15,category:"Signs & Signals",difficulty:"medium",question:"A yellow sign showing a speed below a curve warning is a:",options:["Required minimum speed","Maximum legal speed for the curve","Recommended advisory speed for the curve","Posted speed for all conditions"],correct:2,explanation:"A speed number below a curve warning sign is advisory — it's the recommended safe speed, not a law."},{id:16,category:"Signs & Signals",difficulty:"easy",question:"A steady red traffic light means:",options:["Slow down and proceed with caution","Stop and remain stopped until green","Yield to cross traffic only","You may proceed if no traffic is present"],correct:1,explanation:"Red light = stop. Stay stopped until the light turns green. This is non-negotiable."},{id:17,category:"Signs & Signals",difficulty:"medium",question:"A steady yellow light means:",options:["Speed up to get through before red","The light will turn green soon","Stop if you can do so safely, the light is about to turn red","Yield to pedestrians only"],correct:2,explanation:"Yellow means stop if you can safely. If you're too close to stop safely, proceed cautiously — don't race through."},{id:18,category:"Signs & Signals",difficulty:"easy",question:"A steady green light means:",options:["Go without checking for traffic","You may proceed if the way is clear","You have absolute right of way over all traffic","Speed up to maintain flow"],correct:1,explanation:"Green means go — but only if the way is clear. You still must yield to traffic already in the intersection."},{id:19,category:"Signs & Signals",difficulty:"medium",question:"A flashing red light should be treated as:",options:["A yellow caution light","A stop sign — stop, then proceed when safe","A signal to yield only","A broken light you can ignore"],correct:1,explanation:"Flashing red = stop sign. Come to a complete stop, check traffic, then proceed when safe."},{id:20,category:"Signs & Signals",difficulty:"medium",question:"A flashing yellow light means:",options:["Stop completely","Slow down and proceed with caution","The intersection is closed","You may pass without stopping"],correct:1,explanation:"Flashing yellow = caution. Slow down and look carefully before proceeding."},{id:21,category:"Signs & Signals",difficulty:"medium",question:"A green arrow traffic signal means:",options:["You may go only in the direction of the arrow","Traffic may go in any direction","Yield before turning","The light will change soon"],correct:0,explanation:"A green arrow means protected movement only in the direction the arrow points. Oncoming traffic is stopped."},{id:22,category:"Signs & Signals",difficulty:"hard",question:'When you see a "DO NOT ENTER" sign, you should:',options:["Enter only if the road looks clear","Stop — you are going the wrong way","Slow down and proceed carefully","Treat it like a yield sign"],correct:1,explanation:"DO NOT ENTER means you are facing traffic going the wrong way. Stop and turn around immediately."},{id:23,category:"Signs & Signals",difficulty:"medium",question:'What does a "WRONG WAY" sign mean?',options:["The sign has an error","You are traveling in the wrong direction on a divided road","There is construction ahead","The road has a sharp curve"],correct:1,explanation:"WRONG WAY means you're going against traffic. Stop immediately and turn around safely."},{id:24,category:"Signs & Signals",difficulty:"medium",question:"A solid white line between lanes means:",options:["Passing is allowed when safe","Lanes are moving in the same direction and crossing is discouraged","The road is about to end","You must stay in your lane at all times"],correct:1,explanation:"Solid white lines separate lanes going the same direction. You can change lanes but should avoid it if possible."},{id:25,category:"Signs & Signals",difficulty:"medium",question:"A solid yellow center line means:",options:["Passing is allowed on both sides","No passing allowed from your side","The road has two-way traffic","Advisory speed change ahead"],correct:1,explanation:"A solid yellow line on your side means no passing. The line is a wall on your side of the road."},{id:26,category:"Signs & Signals",difficulty:"medium",question:"Double solid yellow center lines mean:",options:["Passing is allowed in both directions","No passing in either direction","Passing allowed when safe","Road is one-way"],correct:1,explanation:"Double solid yellow = no passing in either direction. Both sides are blocked."},{id:27,category:"Signs & Signals",difficulty:"medium",question:"A broken yellow center line means:",options:["No passing in either direction","Passing is allowed when safe from both directions","One-way traffic only","Construction zone ahead"],correct:1,explanation:"Broken yellow = passing is allowed when it's safe. Check traffic carefully before passing."},{id:28,category:"Signs & Signals",difficulty:"hard",question:"If the center line is broken on your side but solid on the other, you:",options:["May not pass at all","May pass if it is safe","Must stay in the right lane","Can pass at any speed"],correct:1,explanation:"Broken line on your side = you MAY pass. Solid on the other side means they may NOT pass."},{id:29,category:"Signs & Signals",difficulty:"medium",question:"What does a white diamond painted on the road mean?",options:["Construction ahead","Reserved lane for specific vehicles like HOV or bikes","No lane changing","Railroad crossing"],correct:1,explanation:"A diamond marks a restricted lane — usually for high-occupancy vehicles, buses, or bikes only."},{id:30,category:"Speed Limits",difficulty:"easy",question:"What is the maximum speed limit on a Kentucky interstate highway?",options:["55 mph","60 mph","65 mph","70 mph"],correct:2,explanation:"Kentucky interstates are 65 mph. Memory trick: 6+5=11, that's the highway to heaven speed."},{id:31,category:"Speed Limits",difficulty:"easy",question:"The speed limit on most Kentucky state highways is:",options:["45 mph","50 mph","55 mph","60 mph"],correct:2,explanation:'State highways default to 55 mph. "Five-five, keep it alive."'},{id:32,category:"Speed Limits",difficulty:"easy",question:"The standard speed limit in a residential or business district is:",options:["25 mph","30 mph","35 mph","40 mph"],correct:2,explanation:'Business and residential areas default to 35 mph. "Three-five, stay alive in the hive."'},{id:33,category:"Speed Limits",difficulty:"medium",question:"In a school zone when children are present, you must drive:",options:["15 mph","20 mph","25 mph","The posted school zone speed"],correct:3,explanation:"Always obey the posted school zone speed. If children are present, slow to whatever the sign says."},{id:34,category:"Speed Limits",difficulty:"medium",question:"In an active construction zone with workers present, you should:",options:["Match the speed of surrounding traffic","Drive the posted construction zone speed","Drive 10 mph under the normal limit","Drive 55 mph regardless of signs"],correct:1,explanation:"Posted construction zone speeds are law. Fines are often doubled in work zones with workers present."},{id:35,category:"Speed Limits",difficulty:"hard",question:"You may drive slower than the posted speed limit when:",options:["You are running late and need to save time","Conditions are unsafe and require extra caution","Traffic is heavy and everyone else is going slower","Never — you must always drive the posted speed"],correct:1,explanation:"You should always adjust speed to match conditions — rain, fog, ice, or heavy traffic all justify going slower than posted."},{id:36,category:"Speed Limits",difficulty:"medium",question:"When can you drive faster than the posted speed limit?",options:["When passing another vehicle","When traffic is light and the road is clear","When running late for an emergency","Never — the posted speed limit is the maximum"],correct:3,explanation:"The speed limit is a legal maximum. There is no exception. Even passing must happen within the speed limit."},{id:37,category:"Right of Way",difficulty:"easy",question:"At an intersection without signs or signals, who has the right of way?",options:["The larger vehicle","The driver who arrives first","The vehicle on the right","The vehicle going straight"],correct:2,explanation:"No signs = yield to the car on your right. If in doubt, yield — better safe than sorry."},{id:38,category:"Right of Way",difficulty:"medium",question:"At a 4-way stop where all vehicles arrive at the same time:",options:["The vehicle on the left goes first","The vehicle going straight goes first","Yield to the vehicle on your right","Largest vehicle goes first"],correct:2,explanation:"Simultaneous arrival at a 4-way stop: yield to the driver on your right."},{id:39,category:"Right of Way",difficulty:"easy",question:"When two vehicles meet on a narrow mountain road and only one can pass:",options:["The heavier vehicle has right of way","The vehicle facing uphill has the right of way","The vehicle facing downhill backs up","The vehicle traveling faster continues"],correct:1,explanation:"The vehicle going UPHILL has right of way. It's easier for the downhill driver to back up safely."},{id:40,category:"Right of Way",difficulty:"medium",question:"You are turning left at an intersection on a green light. You must yield to:",options:["No one — you have a green light","Oncoming traffic and pedestrians crossing","Only pedestrians","Only vehicles in the oncoming left-turn lane"],correct:1,explanation:"Left turns on green require yielding to ALL oncoming traffic and pedestrians. This is the most common accident."},{id:41,category:"Right of Way",difficulty:"medium",question:"Who has the right of way when entering a roundabout?",options:["Entering vehicles, because they have momentum","Vehicles already IN the roundabout","The vehicle on the left of the entering vehicle","Emergency vehicles always have priority"],correct:1,explanation:"Vehicles already IN the roundabout have right of way. Yield before entering and merge when clear."},{id:42,category:"Right of Way",difficulty:"medium",question:"A pedestrian is crossing at a marked crosswalk. You must:",options:["Honk to alert them you are coming","Yield to the pedestrian completely","Proceed if you can pass safely behind them","Yield only if they are in your lane"],correct:1,explanation:"Pedestrians in crosswalks ALWAYS have right of way. Stop and wait until they are completely clear."},{id:43,category:"Right of Way",difficulty:"hard",question:"A pedestrian is jaywalking (crossing outside a crosswalk). You should:",options:["Honk and maintain speed — they are at fault","Slow down and yield — their safety matters regardless","Proceed normally — they have no legal right of way","Flash your lights as a warning"],correct:1,explanation:"Even jaywalking pedestrians must be protected. You must avoid hitting them regardless of who is legally at fault."},{id:44,category:"Right of Way",difficulty:"medium",question:"An emergency vehicle with lights and siren is approaching. You must:",options:["Speed up to clear the road","Pull to the right side of the road and stop","Stop immediately wherever you are","Yield only if they are in your lane"],correct:1,explanation:"Pull to the RIGHT and stop for emergency vehicles. Stay stopped until they pass completely."},{id:45,category:"Right of Way",difficulty:"medium",question:"You are driving and approach a school bus stopped with flashing red lights. You must:",options:["Stop only if you are behind the bus","Stop if you are coming from either direction on an undivided road","Proceed slowly at 15 mph","Stop only if children are visible outside the bus"],correct:1,explanation:"On an undivided road, stop in BOTH directions for a stopped school bus with red lights. On divided roads, only oncoming traffic stops."},{id:46,category:"Right of Way",difficulty:"medium",question:"When merging onto a freeway, who has the right of way?",options:["You do — you are entering a new road","Traffic already on the freeway","The faster vehicle always has priority","It depends on which vehicle is larger"],correct:1,explanation:"Traffic on the freeway has right of way. You must yield and find a gap to merge safely."},{id:47,category:"Right of Way",difficulty:"hard",question:"A vehicle is exiting a driveway. Who has the right of way?",options:["The exiting vehicle if it gets there first","Traffic on the road the vehicle is entering","Whichever driver waves the other through","The vehicle on the left"],correct:1,explanation:"Traffic on the main road ALWAYS has priority over vehicles entering from driveways or parking lots."},{id:48,category:"Right of Way",difficulty:"medium",question:"You are in a funeral procession. You:",options:["Must obey all traffic signals like normal","May follow the procession through red lights if flagged by police","Have complete right of way over all traffic","Must stop if a pedestrian wants to cross"],correct:1,explanation:"With police escort, funeral processions may proceed through lights. However, the lead vehicle must stop at red lights first."},{id:49,category:"Safe Driving",difficulty:"easy",question:"What is the minimum following distance behind the car in front of you?",options:["1 second","2 seconds","3 seconds","5 seconds"],correct:2,explanation:'Minimum following distance is 3 seconds. Pick a fixed object, when car ahead passes it count "one thousand one, one thousand two, one thousand three" — you should pass it after 3.'},{id:50,category:"Safe Driving",difficulty:"medium",question:"In adverse conditions (rain, fog, ice), you should:",options:["Maintain the normal 3-second following distance","Increase following distance to 4-6 or more seconds","Drive faster to spend less time in the hazard","Turn on hazard lights and proceed normally"],correct:1,explanation:"Bad conditions require MORE following distance — up to double or more. Your stopping distance increases significantly."},{id:51,category:"Safe Driving",difficulty:"easy",question:"When should you use your headlights?",options:["Only at night","From sunset to sunrise and any time visibility is reduced","Only when it is raining","Only when it is dark enough to need them"],correct:1,explanation:"Use headlights from sunset to sunrise AND whenever you cannot see clearly (fog, rain, snow). Also required 30 minutes before sunset."},{id:52,category:"Safe Driving",difficulty:"medium",question:"When should you dim your high beams?",options:["Only when oncoming traffic is within 1,000 feet","When within 500 feet of an oncoming vehicle or 300 feet behind another","Only in city driving","When driving under 40 mph"],correct:1,explanation:'Dim high beams 500 feet before an oncoming car, or 300 feet when following another vehicle. "Five then three, like a countdown."'},{id:53,category:"Safe Driving",difficulty:"medium",question:"How far ahead should you signal before turning?",options:["50 feet","100 feet","200 feet","500 feet"],correct:1,explanation:"Signal at least 100 feet before turning. One football field of warning. This gives other drivers time to react."},{id:54,category:"Safe Driving",difficulty:"easy",question:"What should you do when a tire blows out while driving?",options:["Brake hard immediately","Steer sharply to the shoulder","Hold the steering wheel firmly and gradually reduce speed","Shift into neutral and coast"],correct:2,explanation:"Tire blowout: grip the wheel firmly, ease off the gas gradually, and steer straight. Do NOT brake hard — it can make you spin out."},{id:55,category:"Safe Driving",difficulty:"medium",question:"You are driving on the highway and your vehicle begins to hydroplane. You should:",options:["Brake hard to slow down","Steer sharply to the edge of the road","Ease off the gas and hold the steering wheel straight","Turn the wheel into the skid"],correct:2,explanation:"Hydroplaning: gently ease off the gas, keep the wheel straight, let the tires reconnect. Don't brake hard or jerk the wheel."},{id:56,category:"Safe Driving",difficulty:"medium",question:"What is the proper way to drive through a large puddle or flooded road?",options:["Speed through to minimize time in the water","Drive slowly and steady — or turn around if it is deep","Test with your brakes first","Flash your lights and proceed"],correct:1,explanation:'Drive slowly through puddles or turn around if unsure. Even 6 inches of water can stall your engine. "Turn around, don\'t drown."'},{id:57,category:"Safe Driving",difficulty:"easy",question:"When is it safe to use your cell phone while driving?",options:["At red lights or stop signs","In slow traffic","When using a hands-free device","Never while the vehicle is moving"],correct:2,explanation:"Hands-free only while driving in Kentucky. Using a handheld phone while moving is illegal. At red lights, you are still operating a vehicle."},{id:58,category:"Safe Driving",difficulty:"medium",question:"You should scan the road ahead approximately how far?",options:["Just ahead of your hood","About 1-2 seconds ahead","12-15 seconds ahead","Only as far as headlights illuminate at night"],correct:2,explanation:"Scan 12-15 seconds ahead — about a city block in town, or about 1/4 mile on highways. This gives you time to react."},{id:59,category:"Safe Driving",difficulty:"medium",question:"When passing another vehicle, you should return to your lane when:",options:["You can see the passed vehicle in your rearview mirror","You are at least 100 feet ahead of the passed vehicle","The driver you passed flashes their lights","You feel comfortable you have enough space"],correct:0,explanation:"Return to your lane when you can see the full front of the passed vehicle in your rearview mirror. This ensures safe clearance."},{id:60,category:"Safe Driving",difficulty:"hard",question:"You are driving behind a large truck. Which blind spots should concern you most?",options:["Only the directly behind zone","In front of the truck, directly behind it, and both sides","Only the left side because of the driver's seat position","There are no significant blind spots on modern trucks"],correct:1,explanation:"Large trucks have blind spots in front, behind, and on both sides. If you can't see the truck's mirrors, the driver can't see you."},{id:61,category:"Safe Driving",difficulty:"medium",question:'What does it mean to "drive defensively"?',options:["Drive aggressively to avoid letting others cut you off","Anticipate hazards and stay alert to what other drivers might do","Stay in the fast lane to get where you are going quickly","Drive under the speed limit at all times"],correct:1,explanation:"Defensive driving means expecting the unexpected. Assume other drivers might make mistakes and plan for it."},{id:62,category:"Safe Driving",difficulty:"easy",question:"When should you turn on your hazard lights?",options:["In heavy rain","When your vehicle is stopped or disabled and creating a hazard","Whenever you are driving slowly","Instead of turn signals when making a slow turn"],correct:1,explanation:"Use hazard lights when your vehicle is stopped on the road or creating a hazard. Don't use them as a substitute for turn signals."},{id:63,category:"Safe Driving",difficulty:"medium",question:"How far back should you be from a car before passing it?",options:["Directly behind before moving to pass","Far enough back to see the road ahead is clear","At least 100 feet behind before initiating the pass","As close as needed to judge the opening"],correct:1,explanation:"Before passing, get far enough back to see past the vehicle AND the road ahead is clear for the entire pass."},{id:64,category:"Safe Driving",difficulty:"easy",question:"You must yield to a bicycle in the road by:",options:["Honking to alert the cyclist and passing quickly","Treating the bicycle like a slow car and giving them a full lane","Passing with at least 3 feet of clearance","Waiting until they pull to the shoulder"],correct:2,explanation:"Kentucky law requires at least 3 feet of clearance when passing a cyclist. Treat them as a vehicle."},{id:65,category:"Alcohol & Drugs",difficulty:"easy",question:"What is the legal Blood Alcohol Content (BAC) limit for adult drivers in Kentucky?",options:["0.05%","0.08%","0.10%","0.12%"],correct:1,explanation:"The legal limit for adults is 0.08%. Above this, you are legally impaired and can be arrested for DUI."},{id:66,category:"Alcohol & Drugs",difficulty:"easy",question:"What is the BAC limit for drivers under 21 in Kentucky?",options:["0.08%","0.05%","0.02%","0.00%"],correct:2,explanation:'Under 21, the limit is 0.02% — basically zero. One drink puts you over. "Under 21 BAC is 0.02 - basically zero."'},{id:67,category:"Alcohol & Drugs",difficulty:"medium",question:"Which factor most affects how alcohol impairs you?",options:["Whether you ate a big meal before drinking","How much alcohol you drink","Your body weight","How fast you drink"],correct:1,explanation:"How much you drink is the biggest factor. Food, weight, and rate all matter but total alcohol consumed drives impairment."},{id:68,category:"Alcohol & Drugs",difficulty:"medium",question:"What is the only thing that can truly sober you up after drinking?",options:["Coffee","Cold water or a shower","Exercise","Time"],correct:3,explanation:"Only time sobers you up. Your liver processes alcohol at a fixed rate — about 1 drink per hour. Nothing speeds this up."},{id:69,category:"Alcohol & Drugs",difficulty:"easy",question:"If a police officer asks you to take a breathalyzer test, you:",options:["Can refuse without legal consequence","Can refuse but face license suspension","Must comply or be arrested immediately","Can ask for a blood test instead always"],correct:1,explanation:'Kentucky has "implied consent" law. Refusing a breathalyzer results in automatic license suspension, even if you\'re sober.'},{id:70,category:"Alcohol & Drugs",difficulty:"medium",question:"Prescription medication and alcohol combined:",options:["Cancel each other out","Can multiply the impairing effects significantly","Only matter if you are driving on highways","Are only dangerous with strong prescription drugs"],correct:1,explanation:"Mixing alcohol with medication — even over-the-counter — can dramatically multiply impairment. Always check labels."},{id:71,category:"Alcohol & Drugs",difficulty:"hard",question:"Which of the following is a sign of alcohol impairment?",options:["Improved focus and reduced reaction time","Slurred speech, weaving, and reduced alertness","Increased awareness of surroundings","Faster reaction time to hazards"],correct:1,explanation:"Impairment signs: slurred speech, weaving between lanes, slow reactions, reduced alertness. These make driving extremely dangerous."},{id:72,category:"Alcohol & Drugs",difficulty:"medium",question:"A DUI conviction in Kentucky can result in:",options:["A warning on your first offense only","License suspension, fines, and possible jail time","Only a small fine for first offense","Community service as the only penalty"],correct:1,explanation:"DUI in Kentucky = license suspension, heavy fines, possible jail time, and mandatory alcohol treatment. It stays on your record."},{id:73,category:"Permit & Licensing",difficulty:"easy",question:"To get a Kentucky learner's permit, you must first:",options:["Pass a road skills test","Pass a vision and written knowledge test","Complete a driver education course","Have a licensed driver sponsor you"],correct:1,explanation:"To get a permit, you pass a vision screening and a written knowledge test at the DMV. No road test yet."},{id:74,category:"Permit & Licensing",difficulty:"medium",question:"The passing score for the Kentucky permit knowledge test is:",options:["70%","75%","80%","85%"],correct:2,explanation:"You need 80% or higher to pass. The test has 40 questions — you can miss up to 8."},{id:75,category:"Permit & Licensing",difficulty:"medium",question:"How long is a Kentucky learner's permit valid?",options:["6 months","1 year","2 years","3 years"],correct:1,explanation:"A Kentucky learner's permit is valid for 1 year from issue date. If it expires, you must retest."},{id:76,category:"Permit & Licensing",difficulty:"medium",question:"While driving on a learner's permit, you must be accompanied by:",options:["Any licensed adult over 18","A licensed driver who is 21 or older","A parent or legal guardian only","A certified driving instructor only"],correct:1,explanation:"You must have a licensed driver age 21+ in the front passenger seat at all times while on your permit."},{id:77,category:"Permit & Licensing",difficulty:"hard",question:"With a Kentucky learner's permit, what driving restrictions apply?",options:["No restrictions except needing a passenger","No nighttime driving, no highways, and must have adult supervisor","Cannot drive in cities, only rural roads","Can only drive within 10 miles of home"],correct:1,explanation:"Permit holders must always have a licensed 21+ adult with them. Your permit may also have time-of-day restrictions."},{id:78,category:"Permit & Licensing",difficulty:"medium",question:"To get a full Kentucky driver's license, you must:",options:["Only pass the written test again","Pass a road skills test with a DMV examiner","Complete 50 hours of supervised driving","Wait 12 months from permit date regardless"],correct:1,explanation:"After holding a permit, you must pass a road skills test with a DMV examiner to get your full license."},{id:79,category:"Permit & Licensing",difficulty:"easy",question:"What is a REAL ID and why does it matter?",options:["It is the same as a regular ID but costs more","A federally compliant ID accepted for flights and federal buildings","Required only for international travel","Needed only if you do not have a passport"],correct:1,explanation:"REAL ID is federally compliant and required for boarding domestic flights and entering federal facilities. Kentucky offers it at the DMV."},{id:80,category:"Permit & Licensing",difficulty:"medium",question:"If you fail the Kentucky knowledge test, when can you retake it?",options:["The same day","After 1 day","After 3 days","After 7 days"],correct:1,explanation:"You can retake the knowledge test after 1 day. Take time to review your weak areas before trying again."},{id:81,category:"Permit & Licensing",difficulty:"medium",question:"Documents you need to bring to the Kentucky DMV for a permit include:",options:["Passport only","Proof of identity, Social Security number, and Kentucky residency","Birth certificate only","Any government-issued ID"],correct:1,explanation:"You need proof of identity (birth certificate or passport), Social Security number, and two proofs of Kentucky residence."},{id:82,category:"Permit & Licensing",difficulty:"medium",question:"While driving with a permit, you are pulled over. The officer will check:",options:["Only your insurance","Your permit, the adult supervisor's license, and vehicle registration","Just the vehicle registration","Only the adult supervisor's ID"],correct:1,explanation:"When stopped on a permit, the officer will check your permit, the supervising driver's license, registration, and insurance."},{id:83,category:"Distances & Timing",difficulty:"easy",question:"What is the minimum stopping distance you should maintain behind another vehicle?",options:["1 second","2 seconds","3 seconds","4 seconds"],correct:2,explanation:'3 seconds minimum. Use the "3-second rule" — count three full seconds between when the car ahead passes a fixed point and when you do.'},{id:84,category:"Distances & Timing",difficulty:"medium",question:"How far must you park from a fire hydrant in Kentucky?",options:["5 feet","10 feet","15 feet","20 feet"],correct:2,explanation:"Stay at least 15 feet from fire hydrants. Emergency vehicles need clear access."},{id:85,category:"Distances & Timing",difficulty:"medium",question:"High beams help you see approximately how far ahead?",options:["100 feet","250 feet","500 feet","800 feet"],correct:2,explanation:"High beams illuminate about 500 feet ahead. You should be able to stop within that distance at your current speed."},{id:86,category:"Distances & Timing",difficulty:"medium",question:"Low beams illuminate approximately how far ahead?",options:["100 feet","150 feet","200 feet","300 feet"],correct:2,explanation:"Low beams illuminate about 200 feet. At highway speeds, this is barely enough stopping distance — that's why speeding in fog is so dangerous."},{id:87,category:"Distances & Timing",difficulty:"medium",question:"You must signal at least how far before turning?",options:["50 feet","100 feet","150 feet","200 feet"],correct:1,explanation:"Signal at least 100 feet (one football field) before turning. More on highways where traffic is faster."},{id:88,category:"Distances & Timing",difficulty:"hard",question:"How far from a railroad crossing must you stop if a train is coming?",options:["5 feet","15 feet","25 feet","50 feet"],correct:2,explanation:"Stop no closer than 15 feet from the nearest railroad track. Give the train clearance and yourself a safe buffer."},{id:89,category:"Distances & Timing",difficulty:"medium",question:"When following a large truck, what minimum following distance is recommended?",options:["2 seconds","3 seconds","4-6 seconds","10 seconds"],correct:2,explanation:"Follow trucks at 4-6 seconds minimum. They take much longer to stop than cars and have large blind spots."},{id:90,category:"Distances & Timing",difficulty:"medium",question:"At 60 mph, your vehicle travels approximately how far in 1 second?",options:["44 feet","66 feet","88 feet","100 feet"],correct:2,explanation:"60 mph = 88 feet per second. At highway speeds, even a 1-second distraction means traveling the length of a large house blind."},{id:91,category:"Points & Penalties",difficulty:"medium",question:"How many points does running a red light or stop sign add to your license?",options:["2 points","3 points","4 points","6 points"],correct:1,explanation:"Running a red light or stop sign = 3 points on your license in Kentucky."},{id:92,category:"Points & Penalties",difficulty:"medium",question:"What happens if you accumulate too many points on your Kentucky license?",options:["You get a warning letter only","Your license can be suspended","You only have to pay a fine","Nothing until you reach 20 points"],correct:1,explanation:"Accumulating too many points results in license suspension. 12 or more points in 2 years triggers a hearing."},{id:93,category:"Points & Penalties",difficulty:"hard",question:"Reckless driving in Kentucky adds how many points to your license?",options:["3 points","4 points","6 points","8 points"],correct:3,explanation:"Reckless driving = 6 points. It's one of the highest-point violations — two reckless driving convictions can get your license suspended."},{id:94,category:"Points & Penalties",difficulty:"medium",question:"For drivers under 18, a license is suspended at how many points?",options:["6 points","7 points","8 points","12 points"],correct:1,explanation:"Under-18 drivers are suspended at 7 points — lower than adults. Teen drivers are held to a stricter standard."},{id:95,category:"Points & Penalties",difficulty:"easy",question:"Speeding 10-15 mph over the limit typically adds how many points?",options:["1 point","2 points","3 points","4 points"],correct:2,explanation:"Speeding 10-15 mph over the limit is typically 3 points. The faster over the limit, the more points."},{id:96,category:"Points & Penalties",difficulty:"medium",question:"Following too closely (tailgating) adds how many points?",options:["1 point","2 points","3 points","4 points"],correct:1,explanation:"Tailgating = 3 points. It's a safety hazard and considered a serious moving violation in Kentucky."},{id:97,category:"Points & Penalties",difficulty:"hard",question:"How long do points stay on your Kentucky driving record?",options:["1 year","2 years","3 years","5 years"],correct:1,explanation:"Points stay on your record for 2 years from the date of the violation. They drop off automatically after 2 years."},{id:98,category:"Points & Penalties",difficulty:"medium",question:"If convicted of DUI, what happens to your Kentucky license?",options:["Small fine only for first offense","License is suspended for at least 6 months for first offense","License suspended only after third offense","No license action if BAC is barely over the limit"],correct:1,explanation:"First DUI = minimum 6-month license suspension. Subsequent offenses are much more severe, including permanent revocation."},{id:99,category:"Points & Penalties",difficulty:"medium",question:"An improper lane change violation adds how many points?",options:["1 point","2 points","3 points","4 points"],correct:1,explanation:"Improper lane change = 3 points. Always signal, check mirrors, and check blind spots before changing lanes."},{id:100,category:"Points & Penalties",difficulty:"medium",question:"Failure to yield to an emergency vehicle is how many points?",options:["2 points","3 points","4 points","6 points"],correct:1,explanation:"Failure to yield to emergency vehicles = 3 points plus a potential fine. Always pull right and stop."},{id:101,category:"Safe Driving",difficulty:"easy",question:"When driving at night in an unlit area, you should:",options:["Drive the posted speed limit no matter what","Slow down — your headlights limit how far you can see","Only use parking lights","Flash your lights to see further"],correct:1,explanation:"At night, you should be able to stop within the distance your headlights illuminate. Low beams = about 200 feet max."},{id:102,category:"Safe Driving",difficulty:"medium",question:"You feel drowsy while driving. The safest action is:",options:["Open the windows for fresh air","Turn up the music","Pull off the road safely and rest","Drink coffee and keep driving"],correct:2,explanation:"Drowsy driving is as dangerous as drunk driving. Pull over and rest. Fresh air and coffee help temporarily but don't fix the problem."},{id:103,category:"Signs & Signals",difficulty:"easy",question:"What does a yield sign look like?",options:["Red octagon","Red and white downward triangle","Yellow diamond","White rectangle"],correct:1,explanation:"Yield sign: downward-pointing triangle, red border on white. Slow and give right of way."},{id:104,category:"Right of Way",difficulty:"medium",question:"You are at a T-intersection where your road ends. You must:",options:["Have right of way since you are on the ending road","Yield to ALL traffic on the through road","Treat it like a 4-way stop","Only yield to traffic from the left"],correct:1,explanation:"At a T-intersection, the road that ends must yield COMPLETELY to all traffic on the through road."},{id:105,category:"Safe Driving",difficulty:"medium",question:'What is the "Move Over Law" in Kentucky?',options:["Yield to vehicles entering from the right","Move to another lane or slow down for stopped emergency vehicles on the roadside","Move over when someone is merging","Refers to parking rules only"],correct:1,explanation:"Kentucky Move Over Law: when emergency vehicles are stopped on the roadside with lights on, move to an outer lane. If you can't, slow down significantly."},{id:106,category:"Distances & Timing",difficulty:"easy",question:"How far from an intersection must you stop if there is a stop line?",options:["At the stop line","5 feet before the stop line","10 feet before","Wherever feels comfortable"],correct:0,explanation:"Stop at the stop line. If there is no line, stop before the crosswalk. If there is no crosswalk, stop before the intersection."},{id:107,category:"Permit & Licensing",difficulty:"medium",question:"The Kentucky permit test has how many questions total?",options:["30 questions","35 questions","40 questions","50 questions"],correct:2,explanation:"The Kentucky knowledge test has 40 questions. You need 32 correct (80%) to pass."},{id:108,category:"Signs & Signals",difficulty:"medium",question:"What does a white arrow painted on the road in a lane mean?",options:["Passing is allowed","You must go in the direction shown","Advisory — you may go that direction","Emergency vehicle route"],correct:1,explanation:"White arrows in lanes tell you which direction(s) you may go from that lane. You must follow them."},{id:109,category:"Alcohol & Drugs",difficulty:"medium",question:"Open containers of alcohol in a vehicle are:",options:["Allowed if the passenger is drinking, not the driver","Illegal anywhere in the passenger area of the vehicle","Allowed in the back seat only","Only illegal if the vehicle is moving"],correct:1,explanation:"Open containers are illegal in the passenger area of any vehicle, moving or stopped. Only allowed in sealed containers in the trunk."},{id:110,category:"Safe Driving",difficulty:"easy",question:"Seat belts are required for:",options:["Only the driver","The driver and front seat passengers","The driver and all passengers","Only passengers under 16"],correct:2,explanation:"All occupants must wear seat belts in Kentucky. The driver is responsible and can be fined if any passenger is unbelted."},{id:111,category:"Signs & Signals",difficulty:"easy",question:'What does a "No U-Turn" sign look like?',options:["Red octagon","Circle with a U-turn symbol crossed out","Yellow diamond with U-turn symbol","White rectangle with text only"],correct:1,explanation:"No U-Turn: circular sign with a U-turn arrow crossed out by a red bar. Self-explanatory once you know the format."},{id:112,category:"Right of Way",difficulty:"hard",question:"Two vehicles reach a 4-way stop at exactly the same time and are facing each other going straight. Who goes first?",options:["The vehicle on the right","Either vehicle may proceed","The larger vehicle goes first","The vehicle that was there first"],correct:1,explanation:"When two facing vehicles reach a 4-way stop simultaneously and are both going straight, either may proceed — there is no conflict."},{id:113,category:"Safe Driving",difficulty:"medium",question:"When should you NOT pass another vehicle?",options:["On a straight road with clear visibility","On a hill or curve where you cannot see far ahead","When the dashed center line is on your side","When the vehicle ahead is traveling just below the speed limit"],correct:1,explanation:"Never pass on hills, curves, intersections, railroad crossings, or anywhere you cannot see far enough ahead to complete the pass safely."},{id:114,category:"Permit & Licensing",difficulty:"easy",question:"The Kentucky DMV knowledge test covers material from:",options:["The AAA driving guide","The official Kentucky Driver Manual","Any driving handbook from the last 5 years","Only traffic laws — not signs or rules of the road"],correct:1,explanation:"The test is based on the official Kentucky Driver Manual. Study that and this app — you'll be ready."},{id:115,category:"Signs & Signals",difficulty:"easy",question:'What does a "No Parking" sign with a red slash mean?',options:["Parking is restricted to a short time","No parking at any time","Parking is allowed with a permit","Commercial vehicles only"],correct:1,explanation:"Red slash through parking = no parking, ever, for anyone. These are usually at fire lanes, bus zones, and No Standing zones."},{id:116,category:"Safe Driving",difficulty:"easy",question:"When parking on a hill facing uphill, you should turn your wheels:",options:["Straight","Toward the curb","Away from the curb","Doesn't matter if the parking brake is on"],correct:2,explanation:"Facing uphill: turn wheels AWAY from curb. If brakes fail, the car rolls back and the curb stops it. Facing downhill: turn INTO the curb."},{id:117,category:"Safe Driving",difficulty:"medium",question:"What is the purpose of a deceleration lane (exit lane)?",options:["To accelerate before merging onto the highway","To slow down off the main road before exiting","For trucks only when their brakes fail","For emergency vehicles to pass"],correct:1,explanation:"Deceleration lanes let you exit the highway and slow down without forcing main traffic to slow for you."},{id:118,category:"Signs & Signals",difficulty:"hard",question:"A sign shows a speed limit of 35 in a circle — not a rectangle. This means:",options:["Maximum speed is 35 mph","Minimum speed is 35 mph","Advisory speed for a curve is 35 mph","Construction zone speed limit"],correct:1,explanation:"A circular speed sign with the number in a circle = minimum speed. This appears on some highways where slow vehicles create hazards."},{id:119,category:"Right of Way",difficulty:"medium",question:"You are at a green light and a pedestrian is still crossing. You should:",options:["Honk lightly to let them know to hurry","Wait for the pedestrian to finish crossing before proceeding","Proceed slowly around them","Flash your headlights"],correct:1,explanation:"Even with a green light, you must wait for pedestrians who are still in the crosswalk. Their safety comes first."},{id:120,category:"Alcohol & Drugs",difficulty:"easy",question:"Alcohol affects driving ability by:",options:["Improving focus and reducing jitteriness","Reducing reaction time and impairing judgment","Only affecting vision at high blood alcohol levels","Making you more alert at low doses"],correct:1,explanation:"Even small amounts of alcohol reduce reaction time and impair judgment. Driving ability decreases from the first drink."},{id:121,category:"Signs & Signals",difficulty:"medium",question:'What does a "One Way" sign indicate?',options:["Traffic may flow in either direction here","Traffic flows only in the direction of the arrow","The lane you're in must turn in that direction","Truck traffic must use this route"],correct:1,explanation:"One Way: traffic moves ONLY in the direction the arrow points. Never drive against one-way traffic."},{id:122,category:"Safe Driving",difficulty:"medium",question:"You should check your mirrors approximately how often while driving?",options:["Only when changing lanes","Every 5-8 seconds while driving","Every 15-20 seconds","Only when someone is behind you"],correct:1,explanation:"Check mirrors every 5-8 seconds. This keeps you aware of your surroundings and who is near you at all times."},{id:123,category:"Right of Way",difficulty:"easy",question:"Who must yield when a car is merging from an on-ramp?",options:["Traffic on the highway must slow down and let them in","The merging vehicle must yield to highway traffic","Whoever is going faster has the right of way","The vehicle on the right always has the right of way"],correct:1,explanation:"The merging car must yield. Highway traffic maintains speed and right of way. Time your merge to fit into a gap."},{id:124,category:"Speed Limits",difficulty:"medium",question:"In a lane marked for through traffic, you want to turn. You should:",options:["Turn from that lane if traffic allows","Only turn from a dedicated turn lane","Wait for the lane to clear of traffic then turn","Flash your lights to warn other drivers"],correct:1,explanation:"Turn from dedicated turn lanes only. Turning from through lanes is illegal and dangerous."},{id:125,category:"Safe Driving",difficulty:"easy",question:"What is the most important thing to do before backing up?",options:["Sound your horn","Check all mirrors","Check behind the vehicle by looking over your shoulder","Turn on hazard lights"],correct:2,explanation:"Always look physically over your shoulder before backing. Mirrors have blind spots that miss children and low obstacles behind you."},{id:126,category:"Distances & Timing",difficulty:"medium",question:"What is the rule for following a motorcycle?",options:["Give the same 2-second following distance as cars","Give at least 3-4 seconds following distance","Motorcycles are small so you can follow closely","The same as following any other vehicle"],correct:1,explanation:"Give motorcycles extra following distance (3-4 seconds). They can stop faster than cars and their smaller size makes distance tricky to judge."},{id:127,category:"Right of Way",difficulty:"hard",question:"You are turning right on a red light. When is this allowed?",options:["Always, after stopping completely","After stopping, if there is no sign prohibiting it and no conflicting traffic",'Only if a sign says "Right Turn on Red Permitted"',"Never — all red lights require full stop until green"],correct:1,explanation:"Right turn on red is allowed AFTER a complete stop if: (1) no sign prohibits it, (2) no conflicting traffic or pedestrians."},{id:128,category:"Signs & Signals",difficulty:"medium",question:'A "Keep Right" sign on a divided highway means:',options:["Stay in the right lane at all times","Pass only on the right side","Keep to the right of the barrier or divider","Park on the right side only"],correct:2,explanation:'"Keep Right" on a divided highway means stay to the right of the divider/median. This is directional, not a lane restriction.'},{id:129,category:"Alcohol & Drugs",difficulty:"medium",question:"Marijuana use before driving in Kentucky is:",options:["Legal if you have a medical card","Illegal and impairs driving like alcohol","Only illegal for commercial drivers","Legal for adults 21+ in small amounts"],correct:1,explanation:"Marijuana is illegal in Kentucky and impairs driving. Even states with legal marijuana prohibit impaired driving."},{id:130,category:"Permit & Licensing",difficulty:"hard",question:"While on a learner's permit, you are driving on the highway. Your supervising driver falls asleep. What should you do?",options:["Keep driving carefully until they wake up","Safely pull off the highway and wake them","Have a passenger in the back seat take over","Call the police before pulling over"],correct:1,explanation:"Your supervisor must be awake and available to assist. Safely pull over and wake them. You cannot legally continue without an alert supervisor."},{id:131,category:"Signs & Signals",difficulty:"medium",question:"A lane control signal showing a red X above your lane means:",options:["Slow down — hazard ahead","Do not use this lane","Lane is reserved for emergency vehicles","End of lane — merge required"],correct:1,explanation:"Red X = do not use this lane. It may be closed for an accident, construction, or contraflow traffic."},{id:132,category:"Safe Driving",difficulty:"medium",question:"The proper hand position on the steering wheel is:",options:["12 and 6 o'clock","10 and 2 o'clock (traditional) or 9 and 3 o'clock (modern recommended)","One hand at the top, one hand at the side","Whatever feels comfortable"],correct:1,explanation:"9 and 3 o'clock is now recommended (10 and 2 is acceptable). Keeps hands away from the airbag deployment zone."},{id:133,category:"Right of Way",difficulty:"medium",question:"You are on a one-lane road facing an oncoming car. Who has right of way?",options:["The vehicle going uphill","The vehicle that flashes lights first","The vehicle that yields — there is no universal rule, but the uphill vehicle generally has priority","The heavier vehicle always has priority"],correct:2,explanation:"On one-lane roads, the uphill vehicle has priority since it's harder to restart on a hill. Use courtesy and common sense."},{id:134,category:"Distances & Timing",difficulty:"easy",question:"How long should your turn signal flash before you make the turn?",options:["At least 1-2 flashes","At least 100 feet of signaling (not time)","At least 5 seconds of signaling","Signal as you begin turning"],correct:1,explanation:"Signal at least 100 feet before the turn — not measured in time but in distance. On highways, use even more warning distance."},{id:135,category:"Speed Limits",difficulty:"medium",question:"What is the speed limit in an alley in Kentucky?",options:["10 mph","15 mph","20 mph","Same as the adjacent street"],correct:1,explanation:"Alleys in Kentucky have a 15 mph limit. Pedestrians and children may dart into alleys unexpectedly."},{id:136,category:"Signs & Signals",difficulty:"easy",question:'A sign that says "MERGE" means:',options:["You must stop and wait for traffic","Two lanes of traffic are coming together into one","The road is about to narrow significantly","Traffic must move to the right lane only"],correct:1,explanation:"Merge means two lanes are combining. Yield and take turns with the other lane to create a smooth zipper merge."},{id:137,category:"Safe Driving",difficulty:"hard",question:"You are in an intersection when a red light occurs. You should:",options:["Reverse out of the intersection","Clear the intersection by continuing through safely","Stop immediately wherever you are","Flash your hazard lights and stay stopped"],correct:1,explanation:"If you are already in the intersection when the light turns red, continue through safely. Do not stop in the middle of an intersection."},{id:138,category:"Points & Penalties",difficulty:"medium",question:"How many points for speeding 16-25 mph over the speed limit?",options:["2 points","3 points","4 points","6 points"],correct:2,explanation:"Speeding 16-25 mph over is 4 points in Kentucky. The faster you go over the limit, the more points you receive."},{id:139,category:"Alcohol & Drugs",difficulty:"hard",question:"Kentucky's implied consent law means:",options:["You implicitly agree to drive safely when getting your license","By driving in Kentucky, you consent to BAC testing if lawfully stopped","Police must obtain a warrant before testing your BAC","Consent is implied only for commercial drivers"],correct:1,explanation:"Implied consent = by having a Kentucky license, you've already agreed to BAC testing. Refusing has automatic consequences."},{id:140,category:"Safe Driving",difficulty:"medium",question:"When driving in fog, you should use:",options:["High beams to see further","Low beams or fog lights to reduce glare","No headlights — they create more glare","Parking lights only"],correct:1,explanation:"In fog, use low beams or fog lights. High beams reflect off fog back at you, actually reducing visibility."},{id:141,category:"Signs & Signals",difficulty:"medium",question:'A sign showing "DIVIDED HIGHWAY BEGINS" means:',options:["Traffic is about to become two-way","The road ahead has a physical barrier dividing opposite traffic","Trucks must use the right side","Lane changes are restricted ahead"],correct:1,explanation:"Divided Highway Begins = a median or barrier is coming that divides opposite-direction traffic. Stay on your side."},{id:142,category:"Right of Way",difficulty:"medium",question:"When two cars arrive at an all-way stop simultaneously and one is turning while the other is going straight:",options:["The turning vehicle goes first","The vehicle going straight has the right of way","The vehicle on the right goes first regardless of direction","Either may proceed with caution"],correct:1,explanation:"When a turning vehicle and a through vehicle arrive simultaneously, the through vehicle has priority."},{id:143,category:"Distances & Timing",difficulty:"hard",question:"You must dim your headlights when you are within how many feet BEHIND another vehicle?",options:["100 feet","200 feet","300 feet","500 feet"],correct:2,explanation:"Dim headlights within 300 feet behind another vehicle. High beams in their mirrors are blinding and dangerous."},{id:144,category:"Safe Driving",difficulty:"easy",question:"If you miss your highway exit, you should:",options:["Stop on the shoulder and back up","Cut across the emergency lane to reach the exit","Continue to the next exit and double back","Cross the median if it is paved"],correct:2,explanation:"Miss your exit? Go to the next exit. Never reverse on a highway or cross a median — both are illegal and extremely dangerous."},{id:145,category:"Points & Penalties",difficulty:"medium",question:"An improper backing violation adds how many points?",options:["1 point","2 points","3 points","4 points"],correct:1,explanation:"Improper backing (backing without looking, backing long distances on highways) = 3 points."},{id:146,category:"Speed Limits",difficulty:"easy",question:"The speed limit on most interstates within city limits in Kentucky is:",options:["55 mph","60 mph","65 mph","70 mph"],correct:0,explanation:"Interstates within city limits are typically 55 mph, compared to 65 mph in rural areas. Watch for posted limits as they vary."},{id:147,category:"Permit & Licensing",difficulty:"medium",question:'What does "REAL ID compliant" mean for a Kentucky driver\'s license?',options:["Your license has been verified as authentic","Your license meets federal standards for ID and can be used for domestic flights","Your license is valid in all 50 states","Your license is internationally recognized"],correct:1,explanation:"REAL ID compliant means your Kentucky license meets federal standards and can be used for domestic air travel and federal facilities after 2025."},{id:148,category:"Signs & Signals",difficulty:"medium",question:"What color are guide signs on most US highways?",options:["Blue","Green","White","Brown"],correct:1,explanation:"Green signs on highways give directions, exit information, and distances. Think interstate exit signs."},{id:149,category:"Right of Way",difficulty:"hard",question:"A blind pedestrian with a white cane is crossing. You must:",options:["Honk once to let them know you are there","Yield completely and wait until they have safely crossed","Proceed slowly and carefully past them","Stop only if they are in your direct path"],correct:1,explanation:"Yield completely to all pedestrians with white canes or guide dogs. They cannot see traffic and need full protection."},{id:150,category:"Safe Driving",difficulty:"easy",question:"Before changing lanes, you should ALWAYS:",options:["Just check your mirrors","Signal, check mirrors, and check blind spots physically","Signal and make the change smoothly","Look only in the direction you are moving"],correct:1,explanation:"Before EVERY lane change: signal, check ALL mirrors, then physically check your blind spot. This exact sequence prevents accidents."},{id:151,category:"Alcohol & Drugs",difficulty:"easy",question:"After consuming alcohol, you should wait how long before driving?",options:["At least 1 hour per drink","At least 2 hours after your last drink","Until you feel sober","Until your BAC is confirmed below 0.08%"],correct:0,explanation:"It takes about 1 hour to process 1 standard drink. But the safest choice: don't drink and drive. Ever. Arrange another way."},{id:152,category:"Permit & Licensing",difficulty:"easy",question:"Your Kentucky learner's permit must be with you at all times when driving. This is called:",options:["Permit verification","Documentation requirement","The carry requirement","Implied authorization"],correct:2,explanation:"You must have your permit physically with you whenever you drive. Officers will ask to see it if you are stopped."},{id:153,category:"Signs & Signals",difficulty:"easy",question:'A "Stop Ahead" sign warns you that:',options:["There is a dangerous intersection ahead","A stop sign is coming that you may not see until close","You should prepare to stop for a traffic light","Emergency vehicles are ahead"],correct:1,explanation:'"Stop Ahead" warns that a stop sign is coming — it may be around a curve or at the bottom of a hill where visibility is limited.'},{id:154,category:"Safe Driving",difficulty:"medium",question:'What is a "zipper merge"?',options:["Merging very quickly to beat other traffic","Taking turns merging in an orderly one-at-a-time pattern from two lanes into one","Using the emergency lane to merge quickly","Merging with your blinker off to avoid slowing down"],correct:1,explanation:"Zipper merge: both lanes continue until the merge point, then take turns one-for-one. Studies show this is safer and reduces backups."},{id:155,category:"Points & Penalties",difficulty:"hard",question:"Failure to use a child safety seat when required results in:",options:["Verbal warning only for first offense","A fine and potentially points on your license","Only a fine, no points","No penalty but child services may be notified"],correct:1,explanation:"Failure to properly restrain children in Kentucky = fine and can result in points on your license. Children must be in appropriate seats for their size/age."},{id:156,category:"Distances & Timing",difficulty:"medium",question:"What is the minimum distance you must stay from a bike lane if you need to cross it?",options:["Make sure there are no cyclists before crossing","Watch for cyclists and yield before crossing the bike lane","Stop completely before crossing","Bike lanes are not a legal right of way"],correct:1,explanation:"When crossing a bike lane (to turn right, enter a driveway, etc.) you must yield to cyclists in the lane first."},{id:157,category:"Signs & Signals",difficulty:"easy",question:'What does a "Dead End" sign tell you?',options:["The road becomes one-way ahead","The road ends with no through access — you must turn back","No passing is allowed on this road","Road construction is ahead"],correct:1,explanation:"Dead End means the road has no outlet. You'll have to turn around. Don't drive down it expecting to exit the other side."},{id:158,category:"Right of Way",difficulty:"easy",question:"A postal vehicle or garbage truck is stopped with flashers on. You should:",options:["Honk and pass quickly in the oncoming lane","Pass slowly and carefully when safe, giving plenty of space","Wait behind them indefinitely","Use the sidewalk to go around"],correct:1,explanation:"Pass stopped service vehicles carefully when it's safe. Watch for workers and the vehicle doors opening. In Kentucky, the Move Over law may also apply."},{id:159,category:"Safe Driving",difficulty:"hard",question:"You are approaching a green light at an intersection when a large truck runs the red. You should:",options:["Honk and proceed — you have the right of way","Brake and yield even though you have the green","Flash your headlights as a warning","Accelerate to clear the intersection before impact"],correct:1,explanation:"Always yield to vehicles that have already entered an intersection regardless of your light color. Right of way doesn't matter if there's a crash."},{id:160,category:"Permit & Licensing",difficulty:"medium",question:"During the Kentucky road skills test, what are examiners primarily checking?",options:["Your knowledge of traffic laws","Your ability to safely operate the vehicle in real traffic situations","How fast you can parallel park","Your vehicle's safety equipment"],correct:1,explanation:"The road skills test evaluates how safely you handle real driving scenarios — turns, intersections, parking, and judgment calls."},{id:161,category:"Speed Limits",difficulty:"medium",question:'When you see a "Reduced Speed Ahead" sign, you should:',options:["Wait until you reach the new speed limit sign to slow down","Begin reducing your speed gradually so you are at the new limit when you reach it","Stop completely and check the new limit","Only slow down if there is traffic present"],correct:1,explanation:"Start slowing when you see the warning sign — not when you hit the new limit. The new speed applies when you cross into that zone."},{id:162,category:"Safe Driving",difficulty:"easy",question:"When you are involved in a minor traffic accident with no injuries, you should:",options:["Leave the scene immediately if damage is small","Move vehicles out of traffic if possible, exchange info, and report if required","Only call police if the other driver is at fault","Take photos only and no other action is needed"],correct:1,explanation:"In any accident: move to safety if possible, exchange insurance and license info, and call police if required by your state law or if damage is significant."}],h=[{id:1,category:"Speed Limits",front:"Kentucky Interstate Speed Limit",back:"65 mph (55 mph within city limits). Memory: 6+5=11, highway to heaven."},{id:2,category:"Speed Limits",front:"Kentucky State Highway Speed Limit",back:'55 mph. "Five-five, keep it alive."'},{id:3,category:"Speed Limits",front:"Business/Residential District Speed Limit",back:'35 mph. "Three-five, stay alive in the hive."'},{id:4,category:"Speed Limits",front:"Alley Speed Limit",back:"15 mph."},{id:5,category:"Distances & Timing",front:"High Beam Distance",back:'500 feet illuminated / dim 500ft before oncoming car. "Five then three, li
