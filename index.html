ate = 65. Remember: 6+5=11, highway to heaven.",30:"State highway = 55. Five-five, keep it alive.",31:"Business/residential = 35. Three-five, stay alive in the hive.",47:"4-second rule: pick a fixed point, count one-thousand-one through four.",50:"High beams: 500ft to see, 300ft to dim. Five then three, like a countdown.",48:"Signal 100ft before turning. One football field of warning.",73:"12 points = license suspended for adults. A dozen donuts = done driving.",74:"Under 18 = 7 points. Lucky seven, unlucky for driving.",155:"20/40 vision to pass. 20/20 is perfect, 40 is the farthest off you can be."},y=[{id:1,category:"Signs & Signals",question:"What does the color red mean on a traffic sign or signal?",options:["A general warning","Stop, or that an action is forbidden","Roadwork ahead","Recreational area"],answer:1,explanation:"Red means stop or prohibited. You'll see it on stop signs, yield borders, do-not-enter and wrong-way signs, and on prohibition signs.",freq:1},{id:2,category:"Signs & Signals",question:"A yellow traffic sign is used to:",options:["Mark a construction zone","Give a general warning of conditions ahead","Show motorist services","Mark a no-passing zone only"],answer:1,explanation:"Yellow is the standard warning color. It alerts you to existing or possible hazards such as curves, hills, intersections, or changing road conditions.",freq:1},{id:3,category:"Signs & Signals",question:"An orange sign or flag usually means:",options:["A school zone","A construction or work zone","A railroad crossing","A hospital nearby"],answer:1,explanation:"Orange is reserved for construction and maintenance work zones. Fines for traffic violations are typically doubled in these areas.",freq:1},{id:4,category:"Signs & Signals",question:"A green traffic sign generally provides:",options:["A warning","Guidance, such as directions, distances, and permitted movements","A prohibition","Tourist information"],answer:1,explanation:"Green signs give guidance information like directions and distances, and can indicate movements that are permitted.",freq:2},{id:5,category:"Signs & Signals",question:"A blue sign tells you about:",options:["Recreation areas","Motorist services such as gas, food, and lodging","Construction zones","Warnings ahead"],answer:1,explanation:"Blue signs point you to motorist services like fuel, food, lodging, and hospitals.",freq:2},{id:6,category:"Signs & Signals",question:"A brown sign indicates:",options:["A work zone","Recreational and cultural sites such as parks","A school zone","A dead end"],answer:1,explanation:"Brown signs guide you to recreational and cultural interest areas, like parks and campgrounds.",freq:2},{id:7,category:"Signs & Signals",question:"An eight-sided (octagon) sign always means:",options:["Yield","Stop","Warning","Do not enter"],answer:1,explanation:"The octagon shape is used only for stop signs. You must come to a complete stop.",freq:1},{id:8,category:"Signs & Signals",question:"A downward-pointing triangle sign means:",options:["Stop","Yield the right of way","No passing","School zone"],answer:1,explanation:"An upside-down triangle is a yield sign. Slow down, and give the right of way to traffic and pedestrians before proceeding.",freq:1},{id:9,category:"Signs & Signals",question:"A diamond-shaped sign is used to:",options:["Show the speed limit","Warn of hazards or changing conditions ahead","Mark a hospital","Indicate a one-way street"],answer:1,explanation:"Diamond-shaped signs are warning signs that alert you to possible hazards ahead.",freq:1},{id:10,category:"Signs & Signals",question:"A five-sided (pentagon) sign marks:",options:["A no-passing zone","A school zone or school crossing","A hospital","A rest area"],answer:1,explanation:"The pentagon shape identifies school zones and school crossings. Slow down and watch for children.",freq:2},{id:11,category:"Signs & Signals",question:"A round sign warns you of:",options:["A roundabout only","A railroad crossing ahead","A dead end","A merge"],answer:1,explanation:"A round sign is the advance warning for a railroad crossing. Be ready to stop for a train.",freq:1},{id:12,category:"Signs & Signals",question:"An X-shaped sign with 'RAILROAD CROSSING' (a crossbuck) means you must:",options:["Always stop","Yield to any approaching train","Speed across the tracks","Ignore it if no gate is present"],answer:1,explanation:"A crossbuck is a yield sign at the tracks. Give the right of way to any approaching train.",freq:1},{id:13,category:"Signs & Signals",question:"A vertical rectangular sign is usually a:",options:["Warning sign","Regulatory sign that tells you a law to obey","Guide sign","Service sign"],answer:1,explanation:"Vertical rectangles are regulatory signs, such as speed limits and turn restrictions, that tell you what you must or must not do.",freq:2},{id:14,category:"Signs & Signals",question:"A speed limit sign shows the:",options:["Minimum speed at all times","Maximum legal speed under ideal conditions","Recommended speed for curves","Average traffic speed"],answer:1,explanation:"A posted speed limit is the maximum allowed under ideal conditions. You must drive slower when conditions are poor.",freq:1},{id:15,category:"Signs & Signals",question:"A yellow sign showing a speed below the curve warning is a:",options:["Legal speed limit","Recommended advisory speed for the curve","Minimum speed","Construction speed"],answer:1,explanation:"An advisory or speed-restriction sign shows a recommended speed for a curve or turn. Reduce further in rain, snow, or ice.",freq:2},{id:16,category:"Signs & Signals",question:"A steady red traffic light means:",options:["Slow down and proceed","Stop and remain stopped until it turns green","Yield to cross traffic only","Stop only if other cars are present"],answer:1,explanation:"A steady red light means stop. Remain stopped until the light turns green, except where a legal turn on red is permitted.",freq:1},{id:17,category:"Signs & Signals",question:"A steady yellow traffic light means:",options:["Speed up to clear the intersection","The light is about to turn red; stop if you can do so safely","Stop and wait","Go, the intersection is clear"],answer:1,explanation:"A steady yellow warns that the light is about to turn red. Stop if you can do so safely rather than racing through.",freq:1,susannaNote:"Yellow doesn't mean speed up — it means the party's ending. If you can stop safely, stop. The test always rewards the cautious choice here."},{id:18,category:"Signs & Signals",question:"A flashing red light means:",options:["Proceed without stopping","Treat it exactly like a stop sign","Yield only","The signal is broken, ignore it"],answer:1,explanation:"A flashing red light has the same meaning as a stop sign. Stop completely, then proceed when it is safe.",freq:1,susannaNote:"Flashing red = pretend it's a stop sign. Full stop, then go when clear. A lot of people freeze on this one. Don't overthink it."},{id:19,category:"Signs & Signals",question:"A flashing yellow light means:",options:["Stop completely","Slow down and proceed with caution","The light will turn green next","Yield to no one"],answer:1,explanation:"A flashing yellow light means slow down and proceed carefully through the intersection.",freq:1,susannaNote:"Flashing yellow just means be careful — no full stop required. The key phrase is 'proceed with caution.' Slow down and pay attention, not stop."},{id:20,category:"Signs & Signals",question:"A steady green arrow means you may:",options:["Turn in the direction of the arrow after yielding to traffic and pedestrians still in the intersection","Turn without looking","Stop and wait","Go straight only"],answer:0,explanation:"A green arrow allows a protected turn in that direction, but you must still yield to anyone already in the intersection.",freq:2,susannaNote:"Green arrow means a protected turn — but you still yield to anyone already IN the intersection. The intersection clears first, then you go."},{id:21,category:"Signs & Signals",question:"A flashing yellow arrow means you may turn but must:",options:["Stop first every time","Yield to oncoming traffic and pedestrians","Speed up to beat traffic","Never turn"],answer:1,explanation:"A flashing yellow arrow means the turn is allowed after you yield to oncoming traffic and pedestrians.",freq:2},{id:22,category:"Signs & Signals",question:"When a police officer's directions conflict with a traffic signal, you should:",options:["Obey the signal","Obey the officer","Stop and wait for both to agree","Use your own judgment"],answer:1,explanation:"Always obey a law enforcement officer directing traffic, even if their instructions differ from the signal or signs.",freq:1},{id:23,category:"Signs & Signals",question:"A solid white line on the road means:",options:["Traffic moves in opposite directions","Lane changing is discouraged or prohibited; traffic flows the same way","You may pass freely","The road ends"],answer:1,explanation:"White lines separate lanes of traffic moving in the same direction. A solid white line discourages or prohibits crossing.",freq:2},{id:24,category:"Signs & Signals",question:"A double solid yellow center line means:",options:["Passing is allowed both ways","Passing is prohibited in both directions","Passing is allowed on the right","Only trucks may pass"],answer:1,explanation:"Two solid yellow lines mean no passing in either direction. Yellow lines separate traffic moving in opposite directions.",freq:1},{id:25,category:"Signs & Signals",question:"If there is a broken yellow line on your side and a solid yellow line on the other side:",options:["Neither side may pass","You may pass when it is safe; the other side may not","Both sides may pass","Only the solid-line side may pass"],answer:1,explanation:"You may pass from the broken-line side when safe. Drivers on the solid-line side may not pass.",freq:2,susannaNote:"The broken line is always on the side that CAN pass. Your side is broken, you can go. Their side is solid, they wait. Just look at your side of the road."},{id:26,category:"Signs & Signals",question:"A pennant-shaped (sideways triangle) sign on the left side of the road marks:",options:["A school zone","The start of a no-passing zone","A hospital","A rest stop"],answer:1,explanation:"The pennant-shaped sign marks the beginning of a no-passing zone and is posted on the left side of the road.",freq:2},{id:27,category:"Signs & Signals",question:"A white sign with a black letter showing the speed limit is a:",options:["Warning sign","Regulatory sign you must obey","Guide sign","Advisory sign"],answer:1,explanation:"Regulatory signs are usually white with black or red lettering and tell you laws you must follow, such as speed limits.",freq:2},{id:28,category:"Signs & Signals",question:"At an intersection with a steady green light, you should:",options:["Go immediately no matter what","Proceed but yield to vehicles and pedestrians still in the intersection","Stop and check both ways","Honk before entering"],answer:1,explanation:"Green means go, but you must first yield to any vehicles or pedestrians still finishing their crossing.",freq:1},{id:29,category:"Speed Limits",question:"When not otherwise posted, the speed limit on interstate highways and parkways in Kentucky is:",options:["55 mph","65 mph","70 mph","75 mph"],answer:1,explanation:"Where unposted, the limit is 65 mph on interstates and parkways. The transportation secretary may raise specific highways to 70 mph.",freq:1},{id:30,category:"Speed Limits",question:"When not posted, the speed limit on most other state highways is:",options:["45 mph","55 mph","65 mph","35 mph"],answer:1,explanation:"The default limit on other state highways is 55 mph unless signs say otherwise.",freq:1},{id:31,category:"Speed Limits",question:"When not posted, the speed limit in a business or residential district is:",options:["25 mph","35 mph","45 mph","20 mph"],answer:1,explanation:"Business and residential districts have a default limit of 35 mph.",freq:1},{id:32,category:"Speed Limits",question:"The speed limit in an off-street public parking facility is:",options:["5 mph","10 mph","15 mph","25 mph"],answer:2,explanation:"The limit in a public off-street parking facility is 15 mph.",freq:2},{id:33,category:"Speed Limits",question:"The transportation secretary may raise the speed limit on specific highways up to:",options:["65 mph","70 mph","75 mph","80 mph"],answer:1,explanation:"Specific highways may be posted up to 70 mph at the discretion of the transportation secretary.",freq:3},{id:34,category:"Speed Limits",question:"A posted speed limit tells you:",options:["The minimum speed you must drive","The maximum legal speed under ideal conditions","The speed everyone is driving","The safe speed in any weather"],answer:1,explanation:"The posted limit is the maximum under ideal conditions. In rain, fog, or heavy traffic you must slow down.",freq:1},{id:35,category:"Speed Limits",question:"When you cannot see more than 100 feet ahead due to heavy rain, fog, or snow, you should not drive faster than:",options:["35 mph","25 mph","45 mph","15 mph"],answer:1,explanation:"When visibility drops below about 100 feet, you cannot safely drive faster than 25 mph, and you should use low-beam headlights.",freq:2},{id:36,category:"Speed Limits",question:"If you reach a railroad crossing with no signals and you cannot tell whether a train is coming, you should not cross faster than:",options:["15 mph","25 mph","35 mph","10 mph"],answer:0,explanation:"At an uncontrolled crossing where you can't confirm it's clear, slow to no more than 15 mph and be ready to stop.",freq:2,susannaNote:"No signal, can't see clearly: slow to 15 mph. Not 25, not 35. Fifteen. It's low because trains are quiet and fast and you can't always hear them coming."},{id:37,category:"Speed Limits",question:"A vehicle displaying a slow-moving-vehicle emblem (orange triangle) travels at speeds of about:",options:["25 mph or less","45 mph or less","55 mph or less","Highway speed"],answer:0,explanation:"The reflective orange triangle marks vehicles that travel at 25 mph or less, such as farm equipment. Slow down and pass with care.",freq:2},{id:38,category:"Speed Limits",question:"To choose a safe speed, you should adjust for:",options:["Only the posted limit","Road, weather, traffic, and visibility conditions","Only how fast others are going","Only your schedule"],answer:1,explanation:"Safe speed means matching your speed to conditions, the posted limit, and traffic, not just the sign.",freq:1},{id:39,category:"Speed Limits",question:"Driving much slower than surrounding traffic is:",options:["Always the safest choice","Potentially dangerous and can disrupt traffic flow","Required by law","Only a problem on interstates"],answer:1,explanation:"Going too slowly can be as hazardous as speeding because it disrupts the flow and can cause crashes. Keep pace with safe traffic flow.",freq:2},{id:40,category:"Speed Limits",question:"In a school zone during posted times, you must:",options:["Maintain normal speed","Reduce your speed to the posted school-zone limit","Stop completely","Speed up to clear it fast"],answer:1,explanation:"Obey the reduced school-zone speed during the posted hours and watch carefully for children.",freq:1,susannaNote:"School zone speed: obey whatever is posted, usually 25 mph. The test phrase is 'when children are present' — not just when school is in session."},{id:41,category:"Speed Limits",question:"As your speed increases, the distance needed to stop your vehicle:",options:["Stays the same","Increases significantly","Decreases","Only matters in the rain"],answer:1,explanation:"Stopping distance grows quickly with speed, because both reaction distance and braking distance increase.",freq:1},{id:42,category:"Speed Limits",question:"On a slippery or wet road, you should:",options:["Keep your normal speed","Reduce your speed because stopping takes longer","Speed up to maintain traction","Brake hard to test grip"],answer:1,explanation:"Wet or icy roads reduce traction, so it takes longer to stop and turn. Reduce speed at the first sign of rain, snow, or ice.",freq:1},{id:43,category:"Right of Way",question:"At an open intersection (no signs or signals) where two cars arrive at about the same time, the driver on the left should:",options:["Always go first","Yield to the driver on the right","Speed through","Honk and proceed"],answer:1,explanation:"When two vehicles reach an uncontrolled intersection together, the driver on the left yields to the driver on the right.",freq:1},{id:44,category:"Right of Way",question:"At a four-way stop where you and another driver stop at the same time, you should:",options:["Go first because you arrived","Yield to the driver on your right","Wait for the other driver to wave","Proceed to the left"],answer:1,explanation:"At a four-way stop with simultaneous arrival, yield to the vehicle on your right.",freq:1,susannaNote:"Simultaneous arrival at a 4-way stop: yield to whoever is on your RIGHT. That's the whole rule. Right wins every time."},{id:45,category:"Right of Way",question:"When making a left turn, you must yield to:",options:["Only pedestrians","Oncoming traffic and pedestrians","No one if your light is green","Vehicles behind you"],answer:1,explanation:"A left-turning driver must yield to oncoming vehicles and to pedestrians crossing your path.",freq:1,susannaNote:"Turning left means crossing traffic — so you always yield. A green light doesn't change that. You wait for a safe gap, even on green."},{id:46,category:"Right of Way",question:"When entering a roadway from a driveway or private road, you must:",options:["Take the right of way","Yield to vehicles and pedestrians already on the road","Honk and merge","Stop traffic to enter"],answer:1,explanation:"Traffic already on the roadway has the right of way; yield before pulling out from a driveway or private road.",freq:1},{id:47,category:"Right of Way",question:"In a roundabout, vehicles already circulating:",options:["Must yield to entering traffic","Have the right of way over entering traffic","Must stop for each entrance","Go clockwise"],answer:1,explanation:"Traffic in a roundabout moves counterclockwise and has the right of way. Entering vehicles must yield to circulating traffic.",freq:2},{id:48,category:"Right of Way",question:"When merging onto a freeway, you should:",options:["Stop at the end of the ramp","Use the acceleration lane and yield to traffic already on the freeway","Force your way in","Slow down so others can pass"],answer:1,explanation:"Use the acceleration lane to match traffic speed, find a gap, and yield to vehicles already on the freeway before merging.",freq:1},{id:49,category:"Right of Way",question:"A pedestrian crossing in a marked crosswalk:",options:["Must yield to cars","Has the right of way","Should wait for all cars","Has no rights"],answer:1,explanation:"You must yield to pedestrians in a crosswalk. Stop and let them finish crossing.",freq:1},{id:50,category:"Right of Way",question:"If a pedestrian is jaywalking (crossing illegally outside a crosswalk), you must:",options:["Keep your speed and honk","Still give them the right of way and avoid hitting them","Speed up to pass","Report them"],answer:1,explanation:"Even when a pedestrian crosses illegally, you must still yield and do everything possible to avoid a collision.",freq:2,susannaNote:"Even if they're jaywalking illegally, you still can't hit them. The law is: don't hit pedestrians, period. Their fault doesn't protect you."},{id:51,category:"Right of Way",question:"A funeral procession led by an escort vehicle with flashing lights has:",options:["No special rights","The right of way through intersections","To stop at every light","To yield to all traffic"],answer:1,explanation:"A funeral procession has the right of way through an intersection. Do not cut between the vehicles in the procession.",freq:2},{id:52,category:"Right of Way",question:"When an emergency vehicle approaches with lights and siren, you should:",options:["Speed up to clear the area","Pull to the right edge of the road and stop","Stop immediately in your lane","Continue normally"],answer:1,explanation:"Yield to emergency vehicles by pulling over to the right and stopping until they pass. Do not block intersections.",freq:1},{id:53,category:"Right of Way",question:"If a traffic signal is green but the intersection ahead is blocked, you should:",options:["Enter anyway","Stay out of the intersection until you can clear it","Honk and push through","Turn around"],answer:1,explanation:"Never enter an intersection you cannot completely cross, even on green. Blocking an intersection can get you cited.",freq:2,susannaNote:"Never block an intersection even on a green light. If you can't clear the other side, wait before entering. Blocking is a ticketable offense in Kentucky."},{id:54,category:"Right of Way",question:"A driver already in the intersection when your light turns green:",options:["Must back up","Has the right of way and you must let them clear","Must yield to you","Should stop"],answer:1,explanation:"Yield to any vehicle or pedestrian still in the intersection before you proceed on green.",freq:2},{id:55,category:"Right of Way",question:"When two vehicles approach an intersection where one road ends (a T-intersection), the driver on the road that ends should:",options:["Take the right of way","Yield to traffic on the through road","Speed up to merge","Stop all traffic"],answer:1,explanation:"The driver on the terminating road must yield to traffic on the continuing through road.",freq:2},{id:56,category:"Right of Way",question:"When you want to turn right on a red light, you may do so:",options:["Without stopping","After a complete stop and only when it is safe and not prohibited","Only with a green arrow","Never"],answer:1,explanation:"Right turn on red is allowed after a full stop and check for traffic and pedestrians, unless a sign or red arrow prohibits it.",freq:1,susannaNote:"Right on red = full stop first, every time. Then check left, right, pedestrians, go only when clear. The full stop is what fails people on road tests."},{id:57,category:"Right of Way",question:"A left turn on a red light is allowed only when turning:",options:["From any street","From a one-way street onto another one-way street, where permitted","Onto a two-way street","Across multiple lanes"],answer:1,explanation:"A left on red is permitted only from a one-way street onto another one-way street, after stopping and when not prohibited.",freq:2,susannaNote:"Left on red is one of the trickiest questions on this test. Only legal from a one-way street onto another one-way street. Not from a two-way street. One-way to one-way only."},{id:58,category:"Right of Way",question:"When you approach a yield sign, you should:",options:["Stop completely every time","Slow down and give the right of way to traffic and pedestrians","Speed up to merge","Ignore it if clear"],answer:1,explanation:"A yield sign means slow down and give the right of way to traffic in the intersection or lane you are entering, stopping if needed.",freq:1},{id:59,category:"Right of Way",question:"School buses, transit buses, and hazmat vehicles stopped at railroad crossings expect following drivers to:",options:["Pass on the left","Be ready to stop as well and keep extra distance","Honk","Speed around them"],answer:1,explanation:"These vehicles must stop at railroad crossings, so increase your following distance and be prepared to stop behind them.",freq:2},{id:60,category:"Right of Way",question:"At an uncontrolled intersection, you should always be prepared to:",options:["Assume you have the right of way","Yield and avoid a crash even if you have the right of way","Speed through quickly","Stop for 30 seconds"],answer:1,explanation:"Right of way is something you give, not take. Be ready to yield to avoid a collision regardless of who technically has it.",freq:1},{id:61,category:"Alcohol & DUI",question:"The legal blood alcohol concentration (BAC) limit for drivers age 21 and over in Kentucky is:",options:["0.05%","0.08%","0.10%","0.02%"],answer:1,explanation:"For adult drivers, a BAC of 0.08% or higher is legally impaired (DUI).",freq:1,susannaNote:"Adult BAC limit: 0.08. This will be on your test. One or two drinks can get an average person there faster than they think."},{id:62,category:"Alcohol & DUI",question:"Under Kentucky's zero-tolerance law, drivers under age 21 can be charged with DUI at a BAC as low as:",options:["0.08%","0.02%","0.05%","0.00%"],answer:1,explanation:"Drivers under 21 are subject to zero tolerance, meaning a BAC of 0.02% or higher can result in a DUI charge.",freq:1,susannaNote:"Under 21: 0.02 is basically zero. A single beer can put someone there. Kentucky's message is: if you're under 21, don't drink and drive at all."},{id:63,category:"Alcohol & DUI",question:"Kentucky's implied consent law means that by driving you have agreed to:",options:["Pay any fine","Submit to chemical testing for alcohol or drugs if lawfully arrested","Never drink","Give up your license"],answer:1,explanation:"By driving in Kentucky, you consent to breath, blood, or urine testing if a lawful arrest for DUI is made. Refusal can be used in court.",freq:2},{id:64,category:"Alcohol & DUI",question:"If you refuse a chemical test after a lawful DUI arrest, your driving privilege will be:",options:["Unaffected","Suspended","Restored faster","Fined only"],answer:1,explanation:"Refusing the test leads to an automatic license suspension, and the refusal can be used as evidence against you in court.",freq:2},{id:65,category:"Alcohol & DUI",question:"Alcohol affects your ability to drive by:",options:["Improving focus","Reducing judgment, slowing reaction time, and impairing vision","Increasing alertness","Sharpening coordination"],answer:1,explanation:"Alcohol slows reaction time and impairs judgment, vision, coordination, and concentration, all of which are essential to safe driving.",freq:1},{id:66,category:"Alcohol & DUI",question:"Which factor does NOT affect your blood alcohol concentration?",options:["How much you drink","Time between drinks","Your body weight","How much you exercise at the gym"],answer:3,explanation:"BAC depends on the amount of alcohol, time between drinks, body weight, and food in your stomach, not on workouts.",freq:2},{id:67,category:"Alcohol & DUI",question:"The only thing that reliably lowers your BAC over time is:",options:["Coffee","Time","A cold shower","Exercise"],answer:1,explanation:"Only time allows your body to remove alcohol. Coffee, food, and showers may make you feel more awake but do not lower BAC.",freq:1,susannaNote:"Coffee, cold water, eating — none of it lowers your BAC. Only time does. This is a favorite trick question because coffee feels like it should work."},{id:68,category:"Alcohol & DUI",question:"Combining alcohol with other drugs or medications:",options:["Cancels out the effects","Can multiply the impairing effects","Is always safe","Improves reaction time"],answer:1,explanation:"Mixing alcohol with prescription or over-the-counter drugs can amplify the effects of both and severely impair driving.",freq:2},{id:69,category:"Alcohol & DUI",question:"Driving while fatigued is:",options:["Safe if you drink coffee","About as dangerous as driving under the influence of alcohol","Only a problem at night","Not a real concern"],answer:1,explanation:"Fatigue impairs driving much like alcohol does. If you feel drowsy, pull over to rest rather than continuing.",freq:2},{id:70,category:"Alcohol & DUI",question:"It is illegal in Kentucky to have an open container of alcohol:",options:["Only for the driver","For both the driver and passengers in a moving vehicle","Only after midnight","Only on interstates"],answer:1,explanation:"Neither drivers nor passengers may possess an open alcohol container in a vehicle that is in operation on the highway.",freq:2},{id:71,category:"Alcohol & DUI",question:"A person under 21 in Kentucky may not legally do which of the following with alcohol?",options:["Look at it","Buy, consume, possess, or transport it","Discuss it","Smell it"],answer:1,explanation:"It is unlawful for anyone under 21 to buy, consume, possess, or transport alcohol.",freq:2},{id:72,category:"Alcohol & DUI",question:"An ignition interlock device installed after a DUI will:",options:["Track your speed","Prevent the vehicle from starting if alcohol is detected on your breath","Charge a toll","Record your route"],answer:1,explanation:"An interlock requires a breath sample and blocks the engine from starting if it detects alcohol (it locks out around 0.02 BAC).",freq:3},{id:73,category:"Alcohol & DUI",question:"Which of these is an aggravating circumstance that increases DUI penalties?",options:["Driving exactly the speed limit","Driving more than 30 mph over the limit","Using your turn signals","Driving during the day"],answer:1,explanation:"Aggravating factors include driving 30+ mph over the limit, wrong-way driving, causing injury, a very high BAC, refusing testing, or having a passenger under 12.",freq:2},{id:74,category:"Alcohol & DUI",question:"After drinking, which reaction does NOT occur?",options:["Slurred speech","Reduced alertness","Impaired perception of speed and distance","Improved focus"],answer:3,explanation:"Alcohol degrades alertness, speech, and perception of speed and distance. It does not improve focus, even if a person feels more relaxed.",freq:2},{id:75,category:"Alcohol & DUI",question:"If you are taking a medication that may cause drowsiness, you should:",options:["Drive only at night","Read the label and avoid driving if it warns against it","Double the dose","Drink coffee and drive"],answer:1,explanation:"Always check medication labels for warnings. Many over-the-counter and prescription drugs can impair driving.",freq:2},{id:76,category:"Alcohol & DUI",question:"A first DUI conviction in Kentucky can result in:",options:["A warning only","Fines, possible jail time, and license suspension","Points but no penalty","A free class"],answer:1,explanation:"A first offense can bring a fine, jail time, and a license suspension of several months, along with other requirements.",freq:2},{id:77,category:"Alcohol & DUI",question:"The best way to avoid driving impaired is to:",options:["Drink slowly","Plan ahead with a designated driver or other transportation","Eat a big meal first","Wait 20 minutes"],answer:1,explanation:"If you plan to drink, arrange a sober ride in advance. There is no reliable shortcut to becoming sober quickly.",freq:2},{id:78,category:"Alcohol & DUI",question:"If you are under 21 and a police officer requests a chemical test, you:",options:["Can refuse with no consequence","Must take it or risk license suspension","Need a parent's consent first","Can test later"],answer:1,explanation:"Under implied consent, refusing the test leads to suspension. No parental consent is required to test a driver under 21.",freq:2},{id:79,category:"Safe Driving",question:"Kentucky's recommended minimum following distance behind another vehicle is:",options:["1 second","2 seconds","4 seconds","8 seconds"],answer:2,explanation:"The 2026 manual recommends keeping at least a 4-second following distance. Increase it in poor conditions.",freq:1,susannaNote:"4 seconds is the Kentucky standard — longer than most people think. Pick a fixed object, watch the car ahead pass it, then count. You should reach it at 4+ seconds."},{id:80,category:"Safe Driving",question:"You should increase your following distance when:",options:["The road is dry and clear","It is raining, foggy, or you're following a large vehicle or motorcycle","Traffic is light","You are in a hurry"],answer:1,explanation:"Add time on slippery roads, at night, in fog, behind large vehicles, and behind motorcycles, which can stop or turn quickly.",freq:1},{id:81,category:"Safe Driving",question:"The average driver's reaction time (recognizing a hazard and moving to the brake) is about:",options:["Less than a tenth of a second","Three-quarters of a second to one second","Three seconds","Five seconds"],answer:1,explanation:"An alert driver's perception/reaction time is roughly 3/4 to 1 second, during which the vehicle keeps moving.",freq:2},{id:82,category:"Safe Driving",question:"At 50 mph on dry pavement with good brakes, braking distance alone is about:",options:["20 feet","158 feet","300 feet","75 feet"],answer:1,explanation:"It can take around 158 feet just for the brakes to stop you at 50 mph, not counting reaction distance.",freq:3},{id:83,category:"Safe Driving",question:"If your vehicle begins to skid, you should:",options:["Brake hard","Stay off the brakes and steer where you want to go","Accelerate","Turn the wheel sharply"],answer:1,explanation:"Hard braking can worsen a skid. Ease off the gas, stay off the brakes, and steer gently in the direction you want to go.",freq:2,susannaNote:"Skid recovery: stay off the brakes, steer where you want to go. Hard braking during a skid makes everything worse. Gentle and calm is the move."},{id:84,category:"Safe Driving",question:"If a tire suddenly blows out, you should:",options:["Brake hard immediately","Ease off the gas, hold the wheel firmly, and brake gently once slowed","Steer sharply to the shoulder","Speed up"],answer:1,explanation:"After a blowout, grip the wheel firmly, take your foot off the gas, let the car slow, then brake gently and pull off the road.",freq:2,susannaNote:"Blowout: grip the wheel, ease off the gas, slow gradually, then brake gently. Don't slam the brakes — the car will pull hard toward the flat tire."},{id:85,category:"Safe Driving",question:"Hydroplaning, where your tires ride up on water, can begin at speeds as low as about:",options:["10 mph","35 mph","60 mph","75 mph"],answer:1,explanation:"Hydroplaning can start at fairly low speeds on wet roads. If it happens, ease off the gas and do not brake hard.",freq:2,susannaNote:"Hydroplaning can start around 35 mph on wet roads — not just at highway speeds. That surprises most people. Fix: ease off the gas, don't brake hard."},{id:86,category:"Safe Driving",question:"To recover from hydroplaning, you should:",options:["Brake firmly","Slow down gradually and avoid hard braking","Accelerate through it","Turn sharply"],answer:1,explanation:"Ease off the accelerator and let the car slow gradually. Sudden braking or steering can cause a skid.",freq:2},{id:87,category:"Safe Driving",question:"At night, you should use your high beams when:",options:["Following another car closely","There are no oncoming vehicles","Driving in fog","In heavy rain"],answer:1,explanation:"Use high beams only when no oncoming traffic is present. They let you see about twice as far as low beams.",freq:1},{id:88,category:"Safe Driving",question:"You must dim your high beams within how many feet of an oncoming vehicle?",options:["100 feet","500 feet","1000 feet","50 feet"],answer:1,explanation:"Dim your high beams within 500 feet of oncoming traffic, and within 300 feet when following another vehicle.",freq:1,susannaNote:"Two distances: dim within 500 feet of oncoming traffic, 300 feet when following someone. Five-then-three. Oncoming gets more warning because they're coming at you."},{id:89,category:"Safe Driving",question:"If an oncoming vehicle fails to dim its high beams, you should:",options:["Turn on your own high beams","Look toward the right edge of your lane","Close your eyes briefly","Flash your brights repeatedly"],answer:1,explanation:"Avoid being blinded by looking toward the right edge of your lane and watching the oncoming car out of the corner of your eye.",freq:2},{id:90,category:"Safe Driving",question:"In fog, rain, or snow you should use:",options:["High beams","Low beams","Parking lights only","No lights"],answer:1,explanation:"Low beams reduce glare in fog, rain, and snow. High beams reflect off the moisture and make it harder to see.",freq:1},{id:91,category:"Safe Driving",question:"Ideally, you should look ahead on the road about:",options:["2 to 3 seconds","20 to 30 seconds, and farther when possible","Just past your hood","Only at the car ahead"],answer:1,explanation:"Look well down your path of travel, ideally 20 to 30 seconds ahead, to spot trouble early and plan your moves.",freq:1,susannaNote:"20 to 30 seconds ahead — about a block or two in front of you. Looking that far forward is what lets you react without panic. Eyes up, not just at the car ahead."},{id:92,category:"Safe Driving",question:"A space cushion around your vehicle helps you:",options:["Drive faster","Have time and room to react to hazards","Save fuel","Avoid using mirrors"],answer:1,explanation:"Keeping space on all sides gives you time and room to respond safely to sudden hazards.",freq:2},{id:93,category:"Safe Driving",question:"If a driver is tailgating you, you should:",options:["Brake suddenly to warn them","Increase the space in front of you and let them pass","Speed up well over the limit","Ignore your mirrors"],answer:1,explanation:"When tailgated, open up extra space ahead and allow the tailgater to pass. Do not brake suddenly.",freq:2},{id:94,category:"Safe Driving",question:"You should check your rearview and side mirrors:",options:["Only when parking","Frequently to stay aware of traffic around you","Never while moving","Only at red lights"],answer:1,explanation:"Check mirrors often so you always know where other vehicles are, especially before changing lanes, slowing, or stopping.",freq:1},{id:95,category:"Safe Driving",question:"Before entering a curve, you should:",options:["Speed up","Reduce speed before the curve, not during it","Brake hard mid-curve","Coast in neutral"],answer:1,explanation:"Slow to a safe speed before entering a curve. Hard braking inside the curve can cause your tires to lose traction.",freq:2},{id:96,category:"Safe Driving",question:"To maintain alertness on a long trip, you should:",options:["Drive straight through without breaks","Stop to rest about every 2 hours or 100 miles","Drink alcohol to relax","Drive only at night"],answer:1,explanation:"Plan breaks roughly every 2 hours or 100 miles, get enough sleep beforehand, and stop to nap if you feel drowsy.",freq:2},{id:97,category:"Safe Driving",question:"Wearing headphones or earbuds covering both ears while driving in Kentucky is:",options:["Legal","Illegal","Allowed only on highways","Allowed at low volume"],answer:1,explanation:"Driving while wearing headphones over both ears is illegal because it blocks important sounds like horns and sirens.",freq:2},{id:98,category:"Safe Driving",question:"Using a cell phone while driving increases crash risk by roughly:",options:["No measurable amount","About four times","Half","Ten times"],answer:1,explanation:"Distraction from phone use raises crash risk about fourfold. A distraction is anything that takes attention from driving.",freq:1},{id:99,category:"Safe Driving",question:"You must signal before turning at least:",options:["10 feet ahead","100 feet ahead","500 feet ahead","Only at the corner"],answer:1,explanation:"Signal at least 100 feet before turning so others have time to react.",freq:1,susannaNote:"Signal 100 feet before turning. That's roughly one football field of warning. Signal first, then check, then turn — always in that order."},{id:100,category:"Safe Driving",question:"In Kentucky, hand signals on a standard passenger vehicle are:",options:["Always required","Not a substitute for working mechanical turn signals","Illegal for everyone","Required only at night"],answer:1,explanation:"Passenger vehicles must have working mechanical signals. Hand signals are limited to certain exceptions like bicycles and farm equipment.",freq:3},{id:101,category:"Safe Driving",question:"When approaching a flooded roadway, you should:",options:["Drive through slowly","Turn around and find another route","Speed through quickly","Test the depth with your tires"],answer:1,explanation:"Never drive through standing water on a road. Turn around and find another way; even shallow water can be dangerous.",freq:2},{id:102,category:"Safe Driving",question:"Cargo carried in a passenger vehicle must:",options:["Be in the trunk only","Not obstruct the driver's vision","Be tied to the roof","Never exceed 50 pounds"],answer:1,explanation:"Cargo may be carried as long as it does not block the driver's view of the road.",freq:3},{id:103,category:"Safe Driving",question:"On a road with no sidewalk, a pedestrian should walk:",options:["With the flow of traffic","Facing oncoming traffic","In the center of the road","On either side"],answer:1,explanation:"Pedestrians should walk facing oncoming traffic where there is no sidewalk, so they can see and react to approaching vehicles.",freq:3},{id:104,category:"Safe Driving",question:"Children ages 4 through 8 generally must ride in a booster seat unless they are at least:",options:["4 feet tall","4 feet 9 inches tall","5 feet tall","3 feet 6 inches tall"],answer:1,explanation:"Kentucky requires booster seats for children 4 to 8 years old unless the child is 4 feet 9 inches or taller.",freq:2},{id:105,category:"Rules of the Road",question:"On a multi-lane road, the far-left lane is intended for:",options:["Slow traffic","Passing slower vehicles","Parking","Emergency vehicles only"],answer:1,explanation:"The left lane is the passing lane. If you are not passing and traffic is backing up behind you, move right.",freq:2},{id:106,category:"Rules of the Road",question:"You should generally pass other vehicles:",options:["On the right","On the left","On the shoulder","Whichever is faster"],answer:1,explanation:"Pass on the left. Passing on the right is allowed only in limited, safe situations and never by driving off the roadway.",freq:2},{id:107,category:"Rules of the Road",question:"Kentucky law requires you to complete a pass before coming within how many feet of an oncoming vehicle?",options:["50 feet","200 feet","500 feet","1000 feet"],answer:1,explanation:"You must finish passing before reaching a no-passing zone and before coming within 200 feet of an oncoming vehicle.",freq:2},{id:108,category:"Rules of the Road",question:"You should NOT pass when:",options:["The road is straight","Approaching a curve or hilltop where you cannot see ahead","Traffic is light","The line is broken on your side"],answer:1,explanation:"Never pass where your view is blocked, such as on curves or hills, or near railroad crossings, bridges, and tunnels.",freq:2},{id:109,category:"Rules of the Road",question:"After passing a vehicle, it is safe to return to your lane when:",options:["You are even with it","You can see the entire front of the passed vehicle in your rearview mirror","Three seconds pass","You are one car length ahead"],answer:1,explanation:"Return to your lane only when you can see the whole front of the passed vehicle in your mirror, then signal.",freq:2},{id:110,category:"Rules of the Road",question:"When parking facing downhill, you should turn your front wheels:",options:["Toward the center of the road","Toward the curb or edge of the road","Straight ahead","Either way"],answer:1,explanation:"Facing downhill, turn your wheels toward the curb or road edge so the car rolls away from traffic if the brakes fail.",freq:2,susannaNote:"Downhill: turn wheels TOWARD the curb. If brakes fail, the car rolls into the curb instead of into traffic. Toward the curb equals into safety."},{id:111,category:"Rules of the Road",question:"When parking uphill with a curb, you should turn your front wheels:",options:["Toward the curb","Away from the curb (toward the center of the road)","Straight","It does not matter"],answer:1,explanation:"Uphill with a curb, turn your wheels away from the curb so the tire will roll back into the curb if the brakes fail.",freq:2,susannaNote:"Uphill with a curb: turn wheels AWAY from the curb toward the road. If brakes fail, the curb catches the tire. Away from the curb means the curb stops you."},{id:112,category:"Rules of the Road",question:"When parking uphill or downhill, you should also:",options:["Leave it in neutral","Set the parking brake","Leave the engine running","Open the windows"],answer:1,explanation:"Always set the parking brake when parking on a hill, and turn your wheels appropriately.",freq:2},{id:113,category:"Rules of the Road",question:"A white curb usually means you may stop:",options:["Never","Only to pick up or drop off passengers or mail","For loading freight","For unlimited parking"],answer:1,explanation:"A white curb is for briefly stopping to load or unload passengers or mail.",freq:3},{id:114,category:"Rules of the Road",question:"A red curb means:",options:["Loading zone","No stopping, standing, or parking","Passenger drop-off","Limited-time parking"],answer:1,explanation:"A red curb means no stopping, standing, or parking at any time.",freq:2},{id:115,category:"Rules of the Road",question:"A yellow curb generally means you may stop to:",options:["Park overnight","Load or unload passengers or freight for a stated time","Park free","Never stop"],answer:1,explanation:"A yellow curb is for loading or unloading passengers or freight, usually for a limited, posted time.",freq:3},{id:116,category:"Rules of the Road",question:"You should NOT park:",options:["In a marked space","On a bridge, in an intersection, or blocking a fire hydrant","In a driveway you own","In a parking garage"],answer:1,explanation:"Parking is prohibited in places like intersections, on bridges, and in front of fire hydrants where it creates a hazard.",freq:2},{id:117,category:"Rules of the Road",question:"A U-turn is:",options:["Always legal","Sometimes legal depending on location and signs","Always illegal","Legal only on freeways"],answer:1,explanation:"Whether a U-turn is allowed depends on state and local laws and posted signs. Make one only where it is safe and permitted.",freq:2},{id:118,category:"Rules of the Road",question:"If your turn signals stop working, you should:",options:["Keep driving normally","Use hand signals to indicate turns","Never turn","Use your hazard lights for every turn"],answer:1,explanation:"If mechanical signals fail, use hand signals to show your intentions until they are repaired.",freq:3},{id:119,category:"Rules of the Road",question:"When turning a corner, a recommended steering technique is:",options:["One hand only","Hand-over-hand steering","Steering with your knees","Crossing your arms tightly"],answer:1,explanation:"Hand-over-hand steering gives you good control through turns.",freq:3},{id:120,category:"Rules of the Road",question:"You may drive using only your parking lights:",options:["At dusk","Never","In light traffic","On rainy days"],answer:1,explanation:"Parking lights are not for driving. Use headlights so others can see you; driving on parking lights alone is unsafe and not allowed.",freq:2},{id:121,category:"Rules of the Road",question:"At dawn, dusk, or in rain or snow when visibility is reduced, you should turn on your:",options:["Parking lights","Headlights","Hazard lights","Interior lights"],answer:1,explanation:"Turn on your headlights to see and be seen when light or visibility is low.",freq:1},{id:122,category:"Rules of the Road",question:"Slowing down just to look at a crash or roadside event ('rubbernecking'):",options:["Helps traffic flow","Causes congestion and can lead to crashes","Is encouraged","Is required by law"],answer:1,explanation:"Rubbernecking slows traffic and causes congestion and rear-end crashes. Keep your attention on your own driving.",freq:3},{id:123,category:"Rules of the Road",question:"On a road with three or more lanes in your direction (none specially marked), the far-left lane is meant for:",options:["Large trucks","Passing slower vehicles","Carpoolers only","Emergency vehicles"],answer:1,explanation:"On a multi-lane road, the leftmost lane is intended for passing slower traffic.",freq:2},{id:124,category:"Rules of the Road",question:"Making a series of unnecessary lane changes is called:",options:["Merging","Weaving","Coasting","Yielding"],answer:1,explanation:"Weaving in and out of traffic with unnecessary lane changes increases crash risk and contributes to congestion.",freq:3},{id:125,category:"Rules of the Road",question:"A driver who cannot read or understand English highway signs:",options:["May still get a Kentucky license","Is not permitted to hold a Kentucky driver license","Gets a special permit","Is exempt from signs"],answer:1,explanation:"You must be able to understand highway warning and direction signs in English to hold a Kentucky license, though the written test is offered in many languages.",freq:3},{id:126,category:"Rules of the Road",question:"Seat belts are required in Kentucky for the driver and all passengers in vehicles made after:",options:["1971","1981","1991","2001"],answer:1,explanation:"In vehicles manufactured after 1981, the driver and all passengers must wear properly fastened seat belts.",freq:1},{id:127,category:"Sharing the Road",question:"When a school bus stops with its red lights flashing and stop arm extended, traffic approaching from any direction must:",options:["Slow down and pass carefully","Come to a complete stop","Honk and proceed","Stop only if children are visible"],answer:1,explanation:"On a two-lane or undivided road, all approaching traffic must stop for a school bus loading or unloading, and stay stopped until the lights go off and the bus moves.",freq:1,susannaNote:"School bus red lights: everyone stops, all directions, on undivided roads. This is one of the most serious traffic laws in Kentucky. No exceptions."},{id:128,category:"Sharing the Road",question:"You do NOT have to stop for a stopped school bus with flashing red lights when:",options:["You are right behind it","You are approaching from the opposite direction on a divided highway of four or more lanes","Children are present","It is daytime"],answer:1,explanation:"The only exception is approaching from the opposite direction on a divided highway with four or more lanes separated by a median or barrier.",freq:1,susannaNote:"The one exception: divided highway with 4+ lanes AND a physical median between you. That specific situation only. Everything else: stop."},{id:129,category:"Sharing the Road",question:"A school bus flashing yellow lights means:",options:["Pass quickly","Prepare to stop; the bus is about to load or unload","The bus is broken down","Ignore it"],answer:1,explanation:"Yellow flashing lights warn that the bus is about to stop. Slow down and prepare to stop.",freq:1},{id:130,category:"Sharing the Road",question:"A bus that looks like a school bus but carries adults (such as a church bus), with red lights flashing, should be treated:",options:["Like any other vehicle","Exactly like a school bus, including stopping","With a slow pass","As a hazard to report"],answer:1,explanation:"You must stop for church buses and look-alike buses displaying flashing red lights, just as you would for a school bus.",freq:2},{id:131,category:"Sharing the Road",question:"Motorcyclists are entitled to:",options:["Only half a lane","The use of a complete traffic lane","Ride on the shoulder","Share your lane"],answer:1,explanation:"A motorcycle is entitled to a full traffic lane. Do not crowd or share a lane with a motorcycle.",freq:2},{id:132,category:"Sharing the Road",question:"Because motorcycles are small and easy to miss, you should:",options:["Assume they will move","Make extra visual checks and stay alert for them","Follow them closely","Pass without signaling"],answer:1,explanation:"Look carefully for motorcycles, especially at intersections and when changing lanes, since they are easy to overlook.",freq:2},{id:133,category:"Sharing the Road",question:"When passing a bicyclist, you should:",options:["Sound your horn and speed past","Slow down and allow plenty of space","Pass as closely as possible","Force them onto the shoulder"],answer:1,explanation:"Give bicyclists room. Slow down and pass with as much space as possible, and only when oncoming traffic is clear.",freq:2},{id:134,category:"Sharing the Road",question:"On a two-lane road with a bicyclist ahead in your lane and an oncoming car, you should:",options:["Squeeze past the bike quickly","Slow or stop and let the oncoming car pass, then go around the bike","Honk at the bike","Pass on the shoulder"],answer:1,explanation:"Wait for the oncoming vehicle to clear, then pass the bicyclist with plenty of room. Do not try to squeeze through.",freq:2},{id:135,category:"Sharing the Road",question:"Bicycles ridden after dark in Kentucky must have:",options:["A horn","Front and rear reflectors","A license plate","A second rider"],answer:1,explanation:"Bicycles used at night must have a front and rear reflector so they can be seen.",freq:3},{id:136,category:"Sharing the Road",question:"Bicyclists on the road are:",options:["Exempt from traffic laws","Required to follow the same rules as motor vehicles","Allowed to ignore signals","Always required to use sidewalks"],answer:1,explanation:"Bicyclists have the same rights and responsibilities as drivers and must obey the same traffic laws.",freq:2},{id:137,category:"Sharing the Road",question:"You should take extra care around children near the road because they:",options:["Always follow the rules","May dart into the street unpredictably","Are easy to see","Yield to cars"],answer:1,explanation:"Children may run into the street without warning and don't fully understand traffic dangers, so slow down and stay alert.",freq:2},{id:138,category:"Sharing the Road",question:"When you meet a large truck coming from the opposite direction on a two-lane road, you should:",options:["Move left toward it","Keep as far right as safely possible","Speed up","Flash your lights"],answer:1,explanation:"Stay to the right to avoid the wind turbulence and reduce the risk of a side-swipe with a large oncoming vehicle.",freq:2},{id:139,category:"Sharing the Road",question:"When a truck or bus makes a right turn, it may first swing:",options:["Hard right","Wide to the left to clear the corner","Onto the sidewalk","Into reverse"],answer:1,explanation:"Large vehicles often swing left before turning right. Never try to squeeze between the truck and the curb.",freq:2,susannaNote:"When a big truck swings left before turning right, don't squeeze into that gap. It looks like an opening — it isn't. Let the truck complete the wide turn."},{id:140,category:"Sharing the Road",question:"Vehicles carrying hazardous materials (placarded) must stop at:",options:["No crossings","All railroad crossings","Only marked crossings","Only at night"],answer:1,explanation:"Hazmat vehicles are required to stop at all railroad crossings, so keep extra distance behind them.",freq:2},{id:141,category:"Sharing the Road",question:"When you see a stopped emergency vehicle with flashing lights on the roadside, you should:",options:["Maintain speed","Slow down and, if possible, move over a lane","Speed past","Stop in your lane"],answer:1,explanation:"Move Over laws require you to slow down and, when safe, change lanes away from stopped emergency and service vehicles.",freq:1,susannaNote:"Move Over law: see flashing lights on the shoulder, move to the next lane over if you safely can. If you can't, slow down significantly. It's the law."},{id:142,category:"Sharing the Road",question:"If you are following an emergency vehicle that is responding to a call, you must stay back at least:",options:["50 feet","500 feet","100 feet","1000 feet"],answer:1,explanation:"Do not follow a responding emergency vehicle more closely than 500 feet.",freq:2},{id:143,category:"Sharing the Road",question:"A vehicle displaying a slow-moving-vehicle emblem may be:",options:["A sports car","Farm equipment or other slow vehicle","An ambulance","A police car"],answer:1,explanation:"The orange triangle marks vehicles like farm equipment that travel 25 mph or less. Slow down and pass only when safe.",freq:2},{id:144,category:"Sharing the Road",question:"When sharing the road with a pedestrian who is blind and using a white cane or guide dog, you must:",options:["Honk to alert them","Yield and give them the right of way","Drive around quickly","Wait for them to wave you on"],answer:1,explanation:"Always yield to pedestrians who are blind. Do not block crosswalks and avoid honking, which can be disorienting.",freq:2},{id:145,category:"Permit & Licensing",question:"The minimum age to apply for a Kentucky learner's permit is:",options:["14","15","16","18"],answer:2,explanation:"You must be at least 16 years old to take the vision and written tests and apply for a permit.",freq:2},{id:146,category:"Permit & Licensing",question:"A permit holder ages 16 to 20 must hold the permit for at least:",options:["30 days","90 days","180 days","1 year"],answer:2,explanation:"Permit holders ages 16 to 20 must keep the permit for a minimum of 180 days before applying for an intermediate license.",freq:1,susannaNote:"Adults 21+ only need 30 days with the permit before the road test. Teens 16-20 need 180 days. Know which one applies to you."},{id:147,category:"Permit & Licensing",question:"When driving on a permit, you must be accompanied by a licensed driver who is at least:",options:["18 years old","21 years old","25 years old","Any licensed adult"],answer:1,explanation:"A licensed driver at least 21 years old must occupy the front passenger seat beside you whenever you drive on a permit.",freq:1,susannaNote:"Supervisor must be 21+ AND licensed. Not just any adult — specifically 21. And they must be in the front passenger seat at all times. Both parts matter."},{id:148,category:"Permit & Licensing",question:"Where must the supervising driver sit when you drive on a permit?",options:["Anywhere in the vehicle","In the front passenger seat","In the back seat","They do not need to be present"],answer:1,explanation:"The supervising adult must sit in the front passenger seat next to the permit driver at all times.",freq:1},{id:149,category:"Permit & Licensing",question:"To qualify for an intermediate license, you must complete a practice log of at least:",options:["20 hours","40 hours","60 hours, including 10 at night","100 hours"],answer:2,explanation:"You need 60 hours of supervised practice driving, 10 of which must be at night, certified by a parent or guardian.",freq:2},{id:150,category:"Permit & Licensing",question:"Permit and intermediate drivers under 18 may not drive between:",options:["10 p.m. and 5 a.m.","Midnight and 6 a.m. (without good cause)","9 p.m. and 6 a.m.","Midnight and 4 a.m."],answer:1,explanation:"Drivers under 18 are restricted from driving between midnight and 6 a.m. unless they can show good cause, such as work or an emergency.",freq:2},{id:151,category:"Permit & Licensing",question:"A permit or intermediate driver under 18 is limited to carrying how many unrelated passengers under 20?",options:["No limit","One","Two","Three"],answer:1,explanation:"The passenger restriction limits drivers under 18 to one unrelated person under 20 years of age.",freq:3},{id:152,category:"Permit & Licensing",question:"Kentucky's graduated licensing program has how many phases?",options:["One","Two","Three","Four"],answer:2,explanation:"There are three phases: learner's permit, intermediate license, and full unrestricted license.",freq:3},{id:153,category:"Permit & Licensing",question:"To take the written knowledge test, first-time applicants must pass a:",options:["Road skills test","Vision screening","Drug test","Physical fitness test"],answer:1,explanation:"A vision screening is required before the written test. A minimum acuity of 20/40 (corrected or uncorrected) is needed to proceed.",freq:1},{id:154,category:"Permit & Licensing",question:"Documents you must bring when applying for a permit include:",options:["Only a photo","Proof of identity (birth certificate), Social Security card, and proof of residency","A passport only","A school yearbook"],answer:1,explanation:"Bring originals (not photocopies) of your birth certificate, Social Security card, proof of residency, and required school/parental forms.",freq:2},{id:155,category:"Permit & Licensing",question:"Applicants under 18 applying for a permit need:",options:["Nothing extra","A parent or legal guardian to sign accepting financial responsibility","A job","A second ID"],answer:1,explanation:"A parent or legal guardian must sign the application for an applicant under 18, accepting joint financial responsibility.",freq:3},{id:156,category:"Permit & Licensing",question:"Under Kentucky's point system, an adult driver's license may be suspended after accumulating:",options:["6 points","12 points in a 2-year period","20 points","3 points"],answer:1,explanation:"An adult driver may face suspension at 12 points within two years; a driver under 18 can be suspended at 7 points.",freq:1,susannaNote:"12 points in 2 years = adult license suspended. The 2-year window is rolling, not a calendar year. Under 18: suspended at 7 points."},{id:157,category:"Permit & Licensing",question:"A driver under 18 may have driving privileges suspended after accumulating more than:",options:["12 points","6 points","20 points","3 points"],answer:1,explanation:"Drivers under 18 face suspension after more than 6 points (a hearing is held at 7).",freq:2},{id:158,category:"Permit & Licensing",question:"Points assessed under the Kentucky point system expire after:",options:["6 months","1 year","2 years","5 years"],answer:2,explanation:"Points expire two years from the conviction date, though the conviction stays on your record for five years.",freq:2},{id:159,category:"Permit & Licensing",question:"To use a vehicle for your road test, you must show:",options:["A repair receipt","Proof of liability insurance and proper registration","A gas receipt","A car wash receipt"],answer:1,explanation:"The test vehicle must be properly registered and you must show proof of liability insurance, such as an insurance card or policy.",freq:2},{id:160,category:"Permit & Licensing",question:"If you fail the written knowledge test, you may generally retake it:",options:["Never","On the next available test day, up to the allowed number of attempts","Only after one year","Only after a class"],answer:1,explanation:"You can retake the test, but there are limits on attempts within a period before you must wait, so study and prepare thoroughly.",freq:2},{id:161,category:"Permit & Licensing",question:"To legally drive in Kentucky, you must have:",options:["A full-coverage warranty","Auto liability insurance","A AAA membership","A roadside kit"],answer:1,explanation:"Kentucky requires auto liability insurance to legally operate a vehicle.",freq:1},{id:162,category:"Permit & Licensing",question:"A permit holder must always have which item while driving?",options:["A spare tire","The instruction permit in their possession","A logbook in the trunk","A parent's license"],answer:1,explanation:"You must keep your instruction permit with you whenever you operate a motor vehicle.",freq:2}].map(e=>({...e,mnemonic:g[e.id]||void 0})),b=[17,18,19,20,25,36,40,44,45,50,53,56,57,61,62,67,79,83,84,85,88,91,99,110,111,127,128,139,141,146,147,156],x=[{topic:"Speed",front:"Default speed limit on interstate highways?",back:"65 mph"},{topic:"Speed",front:"Default speed limit on state highways?",back:"55 mph"},{topic:"Speed",front:"Default limit in a business or residential area?",back:"35 mph"},{topic:"Speed",front:"Max speed crossing railroad tracks with no train or signals in sight?",back:"15 mph"},{topic:"Alcohol",front:"DUI BAC limit for drivers 21 and older?",back:"0.08 or above"},{topic:"Alcohol",front:"Zero-tolerance BAC limit for drivers under 21?",back:"0.02 or above"},{topic:"Alcohol",front:"BAC limit for commercial vehicle (CDL) dr  car. Who goes?",diagram:"fourway-first",yourDir:"south",otherDir:"west",otherLabel:"Blue car (arrived after you)",answer:"you",explanation:"First to arrive, first to go. You got there first, so you have the right of way.",tip:"First in, first out — like a queue."},{id:3,title:"Left Turn — Green Light",question:"You want to turn left on a green light. The white car is going straight. Who yields?",diagram:"left-turn-green",yourDir:"left",otherDir:"straight",otherLabel:"White car going straight",answer:"you",explanation:"You must yield to oncoming traffic when turning left, even on a green light. Wait for a safe gap before turning.",tip:"Left turns always yield to oncoming traffic."},{id:4,title:"Entering from a Driveway",question:"You are pulling out of a driveway onto the road. Who has the right of way?",diagram:"driveway",yourDir:"driveway",otherDir:"road",otherLabel:"Cars already on the road",answer:"other",explanation:"Traffic already on the road always has the right of way. You must yield before pulling out from a driveway or private road.",tip:"The road belongs to those already on it."},{id:5,title:"Pedestrian in Crosswalk",question:"A pedestrian is in the marked crosswalk. Who yields?",diagram:"crosswalk",yourDir:"straight",otherDir:"crosswalk",otherLabel:"Pedestrian in crosswalk",answer:"you",explanation:"You must always yield to pedestrians in a crosswalk. Stop and wait until they have fully crossed.",tip:"Pedestrians in crosswalks always have the right of way."},{id:6,title:"Emergency Vehicle Approaching",question:"You hear a siren and see flashing lights behind you. What do you do?",diagram:"emergency",yourDir:"straight",otherDir:"behind",otherLabel:"Emergency vehicle with lights and siren",answer:"you",explanation:"Pull to the right edge of the road and stop. Remain stopped until the emergency vehicle passes. Never block an intersection.",tip:"Pull right and stop. Always."},{id:7,title:"Merging onto a Freeway",question:"You are on the on-ramp merging onto the freeway. Who yields?",diagram:"merge",yourDir:"onramp",otherDir:"freeway",otherLabel:"Cars already on the freeway",answer:"you",explanation:"You must yield to traffic already on the freeway. Use the acceleration lane to match their speed and find a safe gap.",tip:"Freeway traffic does not yield to merging cars — you do."},{id:8,title:"Yield Sign at Intersection",question:"You have a yield sign. The green car has no sign. Who goes?",diagram:"yield-sign",yourDir:"south",otherDir:"east",otherLabel:"Green car (no sign)",answer:"other",explanation:"A yield sign means slow down and give the right of way to traffic in the intersection or lane you are entering.",tip:"Yield signs mean the other person goes first."},{id:9,title:"T-Intersection — Road Ends",question:"Your road dead-ends into a through road (T-intersection). Who yields?",diagram:"t-intersection",yourDir:"terminating",otherDir:"through",otherLabel:"Cars on the through road",answer:"you",explanation:"The driver on the road that ends must yield to all traffic on the continuing through road.",tip:"If your road ends, you yield."},{id:10,title:"Roundabout Entry",question:"You want to enter a roundabout. A car is already circulating inside. Who yields?",diagram:"roundabout",yourDir:"entering",otherDir:"circulating",otherLabel:"Car already in the roundabout",answer:"you",explanation:"Traffic already circulating in a roundabout has the right of way. Yield at the entry point and wait for a safe gap.",tip:"Inside the roundabout always beats entering traffic."},{id:11,title:"Left Turn — Simultaneous Turns",question:"Both you and the oncoming car want to turn left at the same time. Who goes where?",diagram:"dual-left",yourDir:"left",otherDir:"left",otherLabel:"Oncoming car also turning left",answer:"both",explanation:"When two cars at an intersection both want to turn left simultaneously, they can typically both turn behind each other (nose to nose). Proceed carefully.",tip:"Dual left turns: pass behind each other."},{  Social Security number","Two documents proving your Kentucky address (utility bill, bank statement, mail with your name and address)","Payment — check online what your county charges, usually under $20","If under 18: a parent or guardian has to sign a form"]},{emoji:"🌅",title:"The morning of",content:["Get real sleep the night before. I'm serious. Sleep beats cramming.","Eat breakfast. Your brain runs on glucose. Low blood sugar makes everything harder.","Arrive 15-20 minutes early. Lines happen.","Bring water if you want. You're allowed to take your time.","Read every question fully before you answer. The wrong choices are designed to look tempting.","If you're not sure, move on and come back — most systems let you review."]},{emoji:"🧠",title:"Test anxiety is real — here is what helps",content:["Slow your breathing before you start. Three deep breaths, no joke. It activates the part of your brain that thinks clearly.","Remind yourself: you have practiced this. This app has 162 questions. The test has 40. You know more than it covers.","Skip hard questions and come back. You only need 32 right. Leave the ones you're unsure of, finish the rest, then return.","Trust your gut on first reads. Second-guessing yourself is where most wrong answers come from.","The test center is not judging you. The people there have seen hundreds of people take this test. You are not remarkable to them in a bad way."]},{emoji:"🔄",title:"If you do not pass — it is fine",content:["Most states let you retake the next business day. Kentucky allows multiple retakes — check current rules at drive.ky.gov.","The test center will usually tell you which categories you struggled in. That's your study guide for the retake.","Open this app, go to the Most Missed drill, and focus on those categories.","Failing a written test does not mean you can't drive. It means you needed more prep time, and now you have it.","A lot of people don't pass on the first try. Including people who are good drivers."]},{e
